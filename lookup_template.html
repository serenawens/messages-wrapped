<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Search People & Groups — iMessages Wrapped</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0D1117;--panel:#141B22;--panel-2:#1A232C;--border:#26313C;
  --text:#E7EDF3;--muted:#8492A0;--teal:#5EEAD4;--amber:#F2A65A;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:var(--font-body);}
::selection{background:var(--teal);color:#0D1117;}

.wrap{max-width:1120px;margin:0 auto;padding:28px 20px 80px;}

/* Back nav */
.back-nav{margin-bottom:18px;}
.back-nav a{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:12px;color:var(--teal);text-decoration:none;border:1px solid var(--teal);border-radius:8px;padding:8px 14px;background:var(--panel);transition:background .15s,color .15s;}
.back-nav a:hover{background:var(--teal);color:var(--ink);}

/* Header */
.statement-head{position:sticky;top:0;z-index:100;background:var(--ink);display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--border);padding-bottom:18px;padding-top:12px;margin-bottom:22px;flex-wrap:wrap;gap:16px;}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;color:var(--teal);text-transform:uppercase;margin-bottom:6px;}
h1{font-family:var(--font-display);font-weight:600;font-size:30px;margin:0;letter-spacing:-0.01em;}
.subline{font-family:var(--font-mono);color:var(--muted);font-size:12.5px;margin-top:6px;}

/* Year range selector */
.range-control{display:flex;gap:2px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:3px;}
.range-control button{font-family:var(--font-mono);font-size:11.5px;color:var(--muted);background:transparent;border:none;padding:7px 12px;border-radius:6px;cursor:pointer;}
.range-control button.active{background:var(--panel-2);color:var(--teal);}
.range-control button:hover:not(.active){color:var(--text);}

/* Tabs */
.main-tabs{display:flex;gap:28px;border-bottom:1px solid var(--border);margin-bottom:28px;}
.main-tab{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--muted);background:transparent;border:none;padding:0 0 12px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.main-tab.active{color:var(--teal);border-bottom-color:var(--teal);}
.main-tab:hover:not(.active){color:var(--text);}

/* Panels */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:6px;}
.section{margin-bottom:38px;}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;cursor:pointer;user-select:none;}
.section-head:hover .section-title{color:var(--teal);}
.section-head-left{display:flex;align-items:baseline;gap:8px;}
.section-title{font-family:var(--font-display);font-size:18px;font-weight:600;}
.section-note{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
.chevron{font-size:10px;color:var(--muted);display:inline-block;width:10px;}
.section-head-static{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}

/* Search */
.lookup-panel{padding:14px;}
.lookup-search-wrap{display:flex;gap:10px;align-items:center;}
#lookup-search,#group-search{flex:1;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 12px;}
#lookup-search:focus,#group-search:focus{outline:none;border-color:var(--teal);}
.lookup-clear{font-family:var(--font-mono);font-size:11px;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;}
.lookup-clear:hover{color:var(--text);}
.lookup-results{margin-top:10px;border-top:1px solid var(--border);}
.lookup-result-row{padding:10px 4px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px;}
.lookup-result-row:last-child{border-bottom:none;}
.lookup-result-row:hover{background:var(--panel-2);}
.lookup-result-avatar{width:36px;height:36px;border-radius:50%;background:var(--panel-2);border:1px solid var(--border);object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--muted);flex-shrink:0;overflow:hidden;}
.lookup-result-avatar img{width:100%;height:100%;object-fit:cover;}
.lookup-result-name{font-size:14px;color:var(--text);}
.lookup-result-sub{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:2px;}

/* Profile header */
.profile-header{display:flex;align-items:center;gap:20px;margin:24px 0 16px;}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--panel-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:24px;font-weight:600;color:var(--muted);overflow:hidden;flex-shrink:0;}
.profile-name-wrap{}
.profile-name{font-family:var(--font-display);font-size:24px;font-weight:600;}
.profile-sub{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:4px;}

/* Hero stats */
.hero-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:28px;}
.hero-stat{background:var(--panel);padding:18px 20px;}
.hero-stat .num{font-family:var(--font-mono);font-size:26px;font-weight:600;color:var(--text);line-height:1;}
.hero-stat .num.teal{color:var(--teal);}
.hero-stat .num.amber{color:var(--amber);}
.hero-stat .label{font-size:11px;color:var(--muted);margin-top:8px;text-transform:uppercase;letter-spacing:.06em;}
@media(max-width:720px){.hero-row{grid-template-columns:repeat(2,1fr);}}

/* Reply cards */
.reply-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px;}
.reply-card{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:16px;}
.reply-label{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.reply-value{font-family:var(--font-mono);font-size:20px;font-weight:600;}
.reply-value.teal{color:var(--teal);}
.reply-value.amber{color:var(--amber);}
.reply-distro-bar{display:flex;height:24px;border-radius:6px;overflow:visible;background:var(--panel);border:1px solid var(--border);align-items:stretch;}
.reply-distro-seg{height:100%;min-width:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s ease;border-radius:2px;transform-origin:center;position:relative;z-index:0;}
.reply-distro-seg:hover{transform:scale(1.12);z-index:1;}
.reply-distro-legend{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin-top:12px;}
.reply-distro-item{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:10.5px;color:var(--text);}
.reply-distro-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.reply-distro-label{flex:1;color:var(--muted);}
.reply-distro-pct{color:var(--muted);}
.reply-summary{margin-top:14px;}
.reply-summary-label{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.reply-summary-bar{display:flex;height:28px;border-radius:6px;overflow:visible;border:1px solid var(--border);align-items:stretch;}
.reply-summary-seg{height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--ink);min-width:28px;cursor:pointer;transition:transform .15s ease;border-radius:3px;transform-origin:center;position:relative;z-index:0;}
.reply-summary-seg:hover{transform:scale(1.12);z-index:1;}
.reply-seg-label{font-family:var(--font-mono);font-size:9px;font-weight:600;color:var(--ink);opacity:0;transition:opacity .15s ease;pointer-events:none;}
.reply-distro-seg:hover .reply-seg-label,.reply-summary-seg:hover .reply-seg-label{opacity:1;}
.reply-detail-section{margin-top:16px;}
.reply-detail-title{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.reply-detail-blurb{font-size:12px;line-height:1.4;color:var(--muted);margin-bottom:8px;}

/* Rank rows */
.rank-row{display:grid;grid-template-columns:28px 1fr 200px 64px;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid var(--border);}
.rank-row:last-child{border-bottom:none;}
.rank-idx{font-family:var(--font-mono);font-size:12px;color:var(--muted);}
.rank-name{font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rank-bar-track{height:8px;background:var(--panel-2);border-radius:4px;overflow:hidden;}
.rank-bar-fill{height:100%;background:var(--teal);border-radius:3px;}
.rank-bar-fill.amber{background:var(--amber);}
.rank-count{font-family:var(--font-mono);font-size:13px;color:var(--text);text-align:right;}

/* Hour strip */
.hour-strip{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;padding:14px;align-items:flex-end;}
.hour-cell{aspect-ratio:1;border-radius:2px;background:var(--panel-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s ease;transform-origin:center;position:relative;z-index:0;}
.hour-cell:hover{transform:scale(1.18);z-index:1;}
.hour-cell-val{font-family:var(--font-mono);font-size:8px;font-weight:600;color:var(--text);opacity:0;transition:opacity .15s ease;pointer-events:none;line-height:1;}
.hour-cell:hover .hour-cell-val{opacity:1;}

/* Word/emoji chips */
.word-cloud{display:flex;flex-wrap:wrap;gap:8px 10px;padding:14px;}
.word-chip{font-family:var(--font-mono);color:var(--text);background:var(--panel-2);border:1px solid var(--border);border-radius:6px;padding:4px 9px;}
.word-chip b{color:var(--teal);font-weight:600;}
.word-chip .n{color:var(--muted);font-size:10px;margin-left:5px;}
.emoji-cloud{display:flex;flex-wrap:wrap;gap:8px;padding:10px 14px;}
.emoji-chip{font-size:15px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;display:flex;align-items:center;gap:6px;}
.emoji-chip .en{font-family:var(--font-mono);font-size:11px;color:var(--muted);}

/* Trend chart */
.chart-wrap{padding:16px 14px 8px;}

/* GP section */
.gp-stat{padding:16px;font-size:14px;color:var(--text);}
.gp-num{font-family:var(--font-mono);font-size:20px;font-weight:600;color:var(--teal);margin-right:6px;}
.gp-type-list{padding:4px 12px 8px;}
.gp-type-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);}
.gp-type-row:last-child{border-bottom:none;}
.gp-type-name{font-size:13px;color:var(--text);flex:1;}
.gp-type-count{font-family:var(--font-mono);font-size:12px;color:var(--muted);}

/* Response pct rows */
.pct-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-family:var(--font-mono);font-size:11px;color:var(--muted);}
.pct-row .k{width:34px;}
.pct-row .bar-wrap{flex:1;height:4px;background:var(--panel);border-radius:2px;overflow:hidden;}
.pct-row .bar-fill{height:100%;border-radius:2px;}
.pct-row .v{width:28px;text-align:right;}

.empty{padding:30px;text-align:center;color:var(--muted);font-family:var(--font-mono);font-size:12.5px;}

/* Tabs for word/emoji sections */
.tabs{display:flex;gap:4px;margin-bottom:10px;}
.tab-btn{font-family:var(--font-mono);font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--border);padding:6px 12px;border-radius:6px;cursor:pointer;}
.tab-btn.active{color:var(--teal);border-color:var(--teal);}
.tab-btn:hover:not(.active){color:var(--text);}
.trend-month{font-family:var(--font-mono);font-size:11px;color:var(--text);background:var(--panel);border:1px solid var(--border);padding:5px 8px;border-radius:6px;cursor:pointer;}
.trend-controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.tab-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;}

/* Length cards */
.length-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px;}
.length-card{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:14px;}
.length-label{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.length-value{font-family:var(--font-mono);font-size:20px;font-weight:600;}
.length-value.teal{color:var(--teal);}
.length-value.amber{color:var(--amber);}

/* App tooltip */
.app-tooltip{position:fixed;pointer-events:none;display:none;z-index:1000;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:var(--font-mono);font-size:11px;color:var(--text);white-space:normal;line-height:1.55;min-width:130px;max-width:200px;}
.app-tooltip .tip-title{font-weight:600;color:var(--text);margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.app-tooltip .tip-line{color:var(--muted);}
.app-tooltip .tip-line.active{color:var(--text);font-weight:600;}
.app-tooltip .tip-total{margin-top:4px;padding-top:4px;border-top:1px solid var(--border);color:var(--text);}

/* Split rank bar (for sent/received + shared group chat both-count bars) */
.rank-bar-fill-wrap{display:flex;height:100%;}
.top10-row{padding:8px 4px;gap:10px;}
.top10-index{font-family:var(--font-mono);font-size:12px;color:var(--muted);width:28px;flex-shrink:0;text-align:center;}
.top10-name-wrap{flex:0 1 220px;min-width:120px;overflow:hidden;}
.top10-bar-wrap{flex:1 1 auto;min-width:80px;padding:0 8px;}
.top10-count{flex:0 0 56px;text-align:right;font-family:var(--font-mono);font-size:12px;color:var(--text);}

/* Stacked chart legend */
.chart-legend{display:flex;flex-wrap:wrap;gap:5px 12px;padding:4px 14px 10px;font-family:var(--font-mono);font-size:10px;color:var(--muted);}
.chart-legend-item{display:flex;align-items:center;gap:5px;}
.chart-legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.chart-range-badge{display:inline-flex;margin:10px 14px 0;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--panel-2);color:var(--muted);font-family:var(--font-mono);font-size:10px;}

footer{margin-top:50px;padding-top:16px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:10.5px;color:var(--muted);}
</style>
</head>
<body>
<div id="root"></div>
<div id="app-tooltip" class="app-tooltip"></div>

<script type="text/plain" id="data-blob">__IMESSAGE_DATA__</script>

<script>
const DATA = JSON.parse(document.getElementById('data-blob').textContent);

// ── Shared helpers ──────────────────────────────────────────────────────
function fmt(n){ return Math.round(n).toLocaleString('en-US'); }
function esc(s){ return String(s).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function fmtChars(n){ return n!=null ? n+' chars' : '—'; }
function formatDuration(ms){
  if(ms==null) return '—';
  const mins=ms/60000;
  if(mins<1) return '<1m';
  if(mins<60) return Math.round(mins)+'m';
  const h=Math.floor(mins/60), m=Math.round(mins-h*60);
  if(h<24) return m>0?`${h}h ${m}m`:`${h}h`;
  return Math.round(h/24)+'d';
}
function formatHour(h){ const p=h<12?'AM':'PM',d=h%12||12; return `${d} ${p}`; }
function hourCellHtml(v, h, max, rgba){
  const a=(0.06+(v/max)*0.85).toFixed(3);
  const bg=rgba||`rgba(94,234,212,${a})`;
  return `<div class="hour-cell" style="background:${bg}" aria-label="${formatHour(h)} — ${fmt(v)} messages"><span class="hour-cell-val">${fmt(v)}</span></div>`;
}
function profileBarRowHtml({idx, leadHtml, name, sub, barInner, count, onclick}){
  const clickAttr=onclick?` onclick="${onclick}"`:'';
  const rowStyle=onclick?'':' style="cursor:default;"';
  return `<div class="lookup-result-row top10-row"${clickAttr}${rowStyle}>
    ${leadHtml||`<div class="top10-index">${String(idx).padStart(2,'0')}</div>`}
    <div class="top10-name-wrap">
      <div class="lookup-result-name">${name}</div>
      ${sub?`<div class="lookup-result-sub">${sub}</div>`:''}
    </div>
    <div class="top10-bar-wrap"><div class="rank-bar-track">${barInner}</div></div>
    <div class="top10-count">${fmt(count)}</div>
  </div>`;
}

const REPLY_UNDER_KEYS=['<1m','1–5m','5–15m'];
const REPLY_OVER_KEYS=['15–30m','30m–1h','1–6h','6–24h','Over 1 day'];
const REPLY_LONG_KEYS=['1–3 days','3 days – 1 week','1–2 weeks','Over 2 weeks'];
const REPLY_COLORS_TEAL=['#5EEAD4','#3DD4BE','#2BBDA8','#22A894','#1A9280','#147A6A','#0E6456'];
const REPLY_COLORS_AMBER=['#F2A65A','#E89448','#DE8236','#D47028','#CA5E1C','#C04C12','#B63A08'];
function replyBarSeg(pct, color, cls, aria){
  const label=cls==='reply-summary-seg'
    ? `${pct}%`
    : `<span class="reply-seg-label">${pct}%</span>`;
  return `<div class="${cls}" style="width:${pct}%;background:${color};" aria-label="${esc(aria||'')}">${label}</div>`;
}
function replyDetailSection(title, blurb, buckets, keys, colors, offset, context){
  const entries=keys.map((k,i)=>[k,buckets[k]||0,i]).filter(([,v])=>v>0);
  if(!entries.length) return '';
  const bar=entries.map(([k,v,i])=>replyBarSeg(v, colors[offset+i], 'reply-distro-seg', `${k} — ${v}% ${context}`)).join('');
  const legend=keys.map((k,i)=>{
    const v=buckets[k]||0; if(!v) return '';
    return `<div class="reply-distro-item"><div class="reply-distro-swatch" style="background:${colors[offset+i]}"></div><span class="reply-distro-label">${k}</span><span class="reply-distro-pct">${v}%</span></div>`;
  }).join('');
  return `<div class="reply-detail-section">
    <div class="reply-detail-title">${title}</div>
    ${blurb?`<div class="reply-detail-blurb">${blurb}</div>`:''}
    <div class="reply-distro-bar">${bar}</div>
    <div class="reply-distro-legend">${legend}</div>
  </div>`;
}
function replyDistributionHtml(pcts, palette){
  if(!pcts||!Object.keys(pcts).length) return '<div class="empty" style="padding:10px">Not enough reply data.</div>';
  const colors=palette==='amber'?REPLY_COLORS_AMBER:REPLY_COLORS_TEAL;
  if(pcts.summary){
    const under=pcts.summary.under_15||0, over=pcts.summary.over_15||0;
    const quickColor=colors[0], slowColor=colors[4];
    const summary=`<div class="reply-summary">
      <div class="reply-summary-label">Quick vs slow replies</div>
      <div class="reply-summary-bar">
        ${under?replyBarSeg(under, quickColor, 'reply-summary-seg', `Under 15 min — ${under}% of all replies`):''}
        ${over?replyBarSeg(over, slowColor, 'reply-summary-seg', `Over 15 min — ${over}% of all replies`):''}
      </div>
      <div class="reply-distro-legend" style="margin-top:8px;">
        <div class="reply-distro-item"><div class="reply-distro-swatch" style="background:${quickColor}"></div><span class="reply-distro-label">Under 15 min</span><span class="reply-distro-pct">${under}%</span></div>
        <div class="reply-distro-item"><div class="reply-distro-swatch" style="background:${slowColor}"></div><span class="reply-distro-label">Over 15 min</span><span class="reply-distro-pct">${over}%</span></div>
      </div>
    </div>`;
    let html=summary
      +replyDetailSection('Under 15 min','Of those quick replies, how fast were they?', pcts.under||{}, REPLY_UNDER_KEYS, colors, 0, 'of quick replies')
      +replyDetailSection('Over 15 min','Of the slower replies, how long did they take?', pcts.over||{}, REPLY_OVER_KEYS, colors, 2, 'of slow replies');
    if(pcts.over_long){
      html+=replyDetailSection('Over 1 day','Of replies that took more than a day, how long?', pcts.over_long, REPLY_LONG_KEYS, colors, 4, 'of multi-day replies');
    }
    return html;
  }
  return '<div class="empty" style="padding:10px">Not enough reply data.</div>';
}

// Tooltip
function showTip(e,text){ const t=document.getElementById('app-tooltip'); if(!t)return; t.innerHTML=text; t.style.left=(e.clientX+14)+'px'; t.style.top=(e.clientY+14)+'px'; t.style.display='block'; }
function showStackTip(e,title,lines,activeIdx,total){
  const t=document.getElementById('app-tooltip'); if(!t)return;
  let html=`<div class="tip-title">${esc(title)}</div>`;
  lines.forEach((line,i)=>{ html+=`<div class="tip-line${i===activeIdx?' active':''}">${esc(line)}</div>`; });
  if(total!=null) html+=`<div class="tip-total">Total: ${fmt(total)}</div>`;
  t.innerHTML=html;
  const pad=14;
  let left=e.clientX+pad, top=e.clientY+pad;
  t.style.display='block';
  const rect=t.getBoundingClientRect();
  if(left+rect.width>window.innerWidth-8) left=e.clientX-rect.width-pad;
  if(top+rect.height>window.innerHeight-8) top=e.clientY-rect.height-pad;
  t.style.left=left+'px'; t.style.top=top+'px';
}
function moveTip(e){ const t=document.getElementById('app-tooltip'); if(t&&t.style.display==='block'){t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY+14)+'px';} }

// ── Time-of-day bucket helper ────────────────────────────────────────────
function textingBucket(hourCounts){
  if(!hourCounts||!hourCounts.length) return '—';
  const buckets=[
    {label:'12 AM–3 AM',h:[0,1,2]},
    {label:'3 AM–6 AM', h:[3,4,5]},
    {label:'6 AM–9 AM', h:[6,7,8]},
    {label:'9 AM–12 PM',h:[9,10,11]},
    {label:'12 PM–3 PM',h:[12,13,14]},
    {label:'3 PM–6 PM', h:[15,16,17]},
    {label:'6 PM–9 PM', h:[18,19,20]},
    {label:'9 PM–12 AM',h:[21,22,23]},
  ];
  const totals=buckets.map(b=>b.h.reduce((s,h)=>s+(hourCounts[h]||0),0));
  const max=Math.max(...totals);
  if(!max) return '—';
  return buckets[totals.indexOf(max)].label;
}

// Fill all 12 months of a specific year with 0 for missing months
function fillYearMonths(filteredData, rangeKey){
  if(rangeKey==='all') return filteredData;
  const y=parseInt(rangeKey,10);
  const now=new Date();
  const lastM=y===now.getFullYear()?now.getMonth()+1:12;
  const result={};
  for(let m=1;m<=lastM;m++){
    const mk=y+'-'+String(m).padStart(2,'0');
    result[mk]=filteredData[mk]||0;
  }
  return result;
}

// ── Shared date/chart helpers ───────────────────────────────────────────────
function weekStartKey(dk){
  const [y,m,d]=dk.split('-').map(Number);
  const date=new Date(y,m-1,d);
  date.setDate(date.getDate()-date.getDay());
  return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
}

function fillDayGaps(dailyMap, rangeKey){
  const entries=Object.entries(dailyMap).sort();
  const now=new Date();
  let startDate, endDate;
  if(rangeKey==='all'){
    if(!entries.length) return {};
    startDate=new Date(entries[0][0]);
    endDate=new Date(entries[entries.length-1][0]);
  } else {
    const y=parseInt(rangeKey,10);
    startDate=new Date(y,0,1);
    endDate=y===now.getFullYear()?now:new Date(y,11,31);
  }
  const result={};
  const cur=new Date(startDate);
  while(cur<=endDate){
    const dk=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    result[dk]=dailyMap[dk]||0;
    cur.setDate(cur.getDate()+1);
  }
  return result;
}

// Weekly totals: sum of messages within each week bucket.
function dailyToWeeklyTotal(dailyMap, minKey){
  const entries=Object.entries(dailyMap).sort();
  if(!entries.length) return {};
  const buckets={};
  for(const [dk,cnt] of entries){
    let wk=weekStartKey(dk);
    // Snap partial first week so a Sunday in the prior month/year isn't shown
    if(minKey&&wk<minKey) wk=minKey;
    buckets[wk]=(buckets[wk]||0)+cnt;
  }
  return buckets;
}

function fillMonthGaps(filteredData){
  const entries=Object.entries(filteredData).sort();
  if(entries.length<=1) return filteredData;
  const [fy,fm]=entries[0][0].split('-').map(Number);
  const [ly,lm]=entries[entries.length-1][0].split('-').map(Number);
  const result={};
  let y=fy,m=fm;
  while(y<ly||(y===ly&&m<=lm)){
    const mk=y+'-'+String(m).padStart(2,'0');
    result[mk]=filteredData[mk]||0;
    m++;if(m>12){m=1;y++;}
  }
  return result;
}

// ── Yearly aggregation (All Time views) ──────────────────────────────────
function aggregateYearlyMap(map){
  const ym={};
  for(const [k,v] of Object.entries(map||{})){ const y=k.slice(0,4); ym[y]=(ym[y]||0)+v; }
  return ym;
}
function aggregateMonthlyMap(map){
  const mm={};
  for(const [k,v] of Object.entries(map||{})){ const mk=k.slice(0,7); mm[mk]=(mm[mk]||0)+v; }
  return mm;
}
function fillMonthGapsBySender(bySenderMonthly){
  const months=new Set();
  for(const mm of Object.values(bySenderMonthly)) for(const mk of Object.keys(mm)) months.add(mk);
  const sorted=Array.from(months).sort();
  if(sorted.length<=1) return bySenderMonthly;
  const [fy,fm]=sorted[0].split('-').map(Number);
  const [ly,lm]=sorted[sorted.length-1].split('-').map(Number);
  const out={};
  for(const [sid,mm] of Object.entries(bySenderMonthly)){
    out[sid]={}; let y=fy,m=fm;
    while(y<ly||(y===ly&&m<=lm)){ const mk=y+'-'+String(m).padStart(2,'0'); out[sid][mk]=mm[mk]||0; m++; if(m>12){m=1;y++;} }
  }
  return out;
}
function fillYearGaps(yearlyMap){
  const keys=Object.keys(yearlyMap).sort();
  if(!keys.length) return yearlyMap;
  const first=parseInt(keys[0],10), last=parseInt(keys[keys.length-1],10);
  const out={};
  for(let y=first;y<=last;y++) out[String(y)]=yearlyMap[String(y)]||0;
  return out;
}
function fillYearGapsBySender(bySenderYearly){
  const years=new Set();
  for(const ym of Object.values(bySenderYearly)) for(const y of Object.keys(ym)) years.add(y);
  const sorted=Array.from(years).sort();
  if(sorted.length<=1) return bySenderYearly;
  const first=parseInt(sorted[0],10), last=parseInt(sorted[sorted.length-1],10);
  const out={};
  for(const [sid,ym] of Object.entries(bySenderYearly)){
    out[sid]={};
    for(let y=first;y<=last;y++){ const ys=String(y); out[sid][ys]=ym[ys]||0; }
  }
  return out;
}

// Fill each calendar day between two timestamps with 0 for missing days.
function fillDayRange(dailyMap, startTs, endTs){
  const out={};
  const cur=new Date(startTs); cur.setHours(0,0,0,0);
  const end=new Date(endTs);
  while(cur<=end){
    const dk=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    out[dk]=dailyMap[dk]||0;
    cur.setDate(cur.getDate()+1);
  }
  return out;
}

// ── Effective range + granularity resolver ───────────────────────────────
// rangeKey: 'all' | 'YYYY';  month: 'all' | 'MM'
function trendView(rangeKey, month){
  const now=new Date();
  if(rangeKey==='all') return {allTime:true};
  const y=parseInt(rangeKey,10);
  if(month&&month!=='all'){
    const m=parseInt(month,10);
    const start=new Date(y,m-1,1,0,0,0,0).getTime();
    let end=new Date(y,m,0,23,59,59,999).getTime(); // day 0 of next month = last day
    if(y===now.getFullYear()&&m-1===now.getMonth()) end=Math.min(end,now.getTime());
    return {allTime:false, start, end, month:m};
  }
  const start=new Date(y,0,1,0,0,0,0).getTime();
  let end=(y===now.getFullYear())?now.getTime():new Date(y,11,31,23,59,59,999).getTime();
  return {allTime:false, start, end};
}
function tsToDateKey(ts){
  const d=new Date(ts);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// Build a single-line trend series from a daily map (+ monthly fallback).
// Returns {data:{key:val}, granularity}.
function buildLineSeries(dailyMap, monthlyMap, rangeKey, month, mode, allMode){
  if(rangeKey==='all'){
    if(allMode==='monthly'){
      const src=(monthlyMap&&Object.keys(monthlyMap).length)?monthlyMap:aggregateMonthlyMap(dailyMap||{});
      return {data:fillMonthGaps(src), granularity:'monthly'};
    }
    const src=(dailyMap&&Object.keys(dailyMap).length)?dailyMap:(monthlyMap||{});
    return {data:fillYearGaps(aggregateYearlyMap(src)), granularity:'yearly'};
  }
  const v=trendView(rangeKey, month);
  if(dailyMap&&Object.keys(dailyMap).length){
    const filled=fillDayRange(dailyMap, v.start, v.end);
    if(mode==='daily') return {data:filled, granularity:'daily'};
    return {data:dailyToWeeklyTotal(filled, tsToDateKey(v.start)), granularity:'weekly'};
  }
  // Monthly fallback (no daily data available)
  const filtered={};
  for(const [mk,cnt] of Object.entries(monthlyMap||{})){
    const d=new Date(mk+'-01').getTime(); if(d>=v.start&&d<=v.end) filtered[mk]=(filtered[mk]||0)+cnt;
  }
  const data=(month&&month!=='all')?filtered:fillYearMonths(filtered, rangeKey);
  return {data, granularity:'monthly'};
}

// Build per-sender stacked series. Returns {bySender, granularity}.
function buildStackedSeries(bySenderDay, bySenderMonth, rangeKey, month, mode, allMode){
  const hasDay=bySenderDay&&Object.keys(bySenderDay).length;
  if(rangeKey==='all'){
    if(allMode==='monthly'){
      const src=(bySenderMonth&&Object.keys(bySenderMonth).length)?bySenderMonth:{};
      const out={};
      if(Object.keys(src).length){
        for(const [sid,map] of Object.entries(src)) out[sid]=map;
      } else {
        for(const [sid,map] of Object.entries(bySenderDay||{})) out[sid]=aggregateMonthlyMap(map);
      }
      return {bySender:fillMonthGapsBySender(out), granularity:'monthly'};
    }
    const src=hasDay?bySenderDay:(bySenderMonth||{});
    const out={};
    for(const [sid,map] of Object.entries(src)) out[sid]=aggregateYearlyMap(map);
    return {bySender:fillYearGapsBySender(out), granularity:'yearly'};
  }
  const v=trendView(rangeKey, month);
  if(hasDay){
    const out={};
    for(const [sid,daily] of Object.entries(bySenderDay)){
      const filled=fillDayRange(daily, v.start, v.end);
      out[sid]= mode==='daily'?filled:dailyToWeeklyTotal(filled, tsToDateKey(v.start));
    }
    return {bySender:out, granularity: mode==='daily'?'daily':'weekly'};
  }
  // Monthly fallback
  const out={};
  for(const [sid,monthly] of Object.entries(bySenderMonth||{})){
    const fm={};
    for(const [mk,cnt] of Object.entries(monthly)){
      const d=new Date(mk+'-01').getTime(); if(d>=v.start&&d<=v.end) fm[mk]=cnt;
    }
    out[sid]=(month&&month!=='all')?fm:fillYearMonths(fm, rangeKey);
  }
  return {bySender:out, granularity:'monthly'};
}

// ── Chart animation (rAF interpolation, reduced-motion aware) ─────────────
const _chartAnim={};
function _reduceMotion(){ return !!(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches); }
function _clearChartAnim(canvasId){ const p=_chartAnim[canvasId]; if(p&&p.raf) cancelAnimationFrame(p.raf); delete _chartAnim[canvasId]; }
// Resample a value array to length m by positional linear interpolation.
// Lets an old line shape "shift into" a new one even when point counts differ.
function _resample(vals, m){
  if(m<=0) return [];
  if(!vals.length) return new Array(m).fill(0);
  if(vals.length===1) return new Array(m).fill(vals[0]);
  if(m===1) return [vals[vals.length-1]];
  const out=[];
  for(let i=0;i<m;i++){
    const pos=i*(vals.length-1)/(m-1);
    const lo=Math.floor(pos), hi=Math.ceil(pos), frac=pos-lo;
    out.push(vals[lo]*(1-frac)+vals[hi]*frac);
  }
  return out;
}
function _sortedVals(map){ return Object.entries(map||{}).sort((a,b)=>a[0]<b[0]?-1:1).map(e=>e[1]); }
function _easeOutCubic(t){ return 1-Math.pow(1-t,3); }

function animatedDrawTrend(canvasId, targetData, color, granularity, opts){
  opts=opts||{};
  const prev=_chartAnim[canvasId];
  if(prev&&prev.raf) cancelAnimationFrame(prev.raf);
  const targetEntries=Object.entries(targetData||{}).sort((a,b)=>a[0]<b[0]?-1:1);
  const draw=(d,o)=>drawTrend(canvasId,d,color,granularity,o);
  if(_reduceMotion()){
    draw(targetData,{});
    _chartAnim[canvasId]={data:targetData,granularity,displayed:targetData,raf:null};
    return;
  }
  if(!targetEntries.length){
    draw(targetData,{});
    _chartAnim[canvasId]={data:targetData,granularity,displayed:targetData,raf:null};
    return;
  }
  const targetVals=targetEntries.map(e=>e[1]);
  const targetMax=Math.max(1,...targetVals);
  const startResampled=opts.rise||!prev
    ? new Array(targetEntries.length).fill(0)
    : _resample(_sortedVals(prev.displayed||prev.data||{}), targetEntries.length);
  const dur=opts.rise?400:320,t0=performance.now();
  _chartAnim[canvasId]={data:targetData,granularity,displayed:targetData,raf:null};
  function frame(now){
    const t=Math.min(1,(now-t0)/dur);const e=_easeOutCubic(t);
    const cur={};
    targetEntries.forEach(([k],i)=>{ const sv=startResampled[i]||0; cur[k]=sv+(targetVals[i]-sv)*e; });
    draw(cur,{scaleMax:targetMax,animating:t<1});
    _chartAnim[canvasId].displayed=cur;
    if(t<1) _chartAnim[canvasId].raf=requestAnimationFrame(frame);
    else _chartAnim[canvasId].raf=null;
  }
  _chartAnim[canvasId].raf=requestAnimationFrame(frame);
}

function _stackedMax(bySender){
  const periods=new Set();
  for(const m of Object.values(bySender||{})) for(const p of Object.keys(m)) periods.add(p);
  let mx=1;
  for(const p of periods){ let s=0; for(const m of Object.values(bySender||{})) s+=(m[p]||0); if(s>mx)mx=s; }
  return mx;
}
function _stackOrder(bySender){
  const totals={};
  for(const [sid,m] of Object.entries(bySender||{})) totals[sid]=Object.values(m).reduce((s,v)=>s+v,0);
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const topSids=sorted.slice(0,5).map(([s])=>s);
  return {topSids, hasOther:sorted.length>5};
}
function animatedDrawStacked(canvasId, targetBySender, granularity, handles, opts){
  opts=opts||{};
  const prev=_chartAnim[canvasId];
  if(prev&&prev.raf) cancelAnimationFrame(prev.raf);
  const periods=new Set();
  for(const m of Object.values(targetBySender||{})) for(const p of Object.keys(m)) periods.add(p);
  const order=_stackOrder(targetBySender);
  const draw=(d,o)=>drawStackedTrend(canvasId,d,granularity,handles,Object.assign({order},o));
  if(_reduceMotion()||!periods.size){
    draw(targetBySender,{});
    _chartAnim[canvasId]={data:targetBySender,granularity,displayed:targetBySender,raf:null};
    return;
  }
  const targetMax=_stackedMax(targetBySender);
  const startSrc=prev&&!opts.rise?(prev.displayed||prev.data||{}):{};
  const sids=Object.keys(targetBySender||{});
  const targetPeriodsArr=Array.from(periods).sort();
  const startBySid={};
  for(const sid of sids){
    const tvals=targetPeriodsArr.map(p=>(targetBySender[sid]||{})[p]||0);
    const svals=(sid in startSrc)?_resample(_sortedVals(startSrc[sid]), targetPeriodsArr.length):new Array(targetPeriodsArr.length).fill(0);
    startBySid[sid]={tvals,svals};
  }
  const dur=opts.rise?400:320,t0=performance.now();
  _chartAnim[canvasId]={data:targetBySender,granularity,displayed:targetBySender,raf:null};
  function frame(now){
    const t=Math.min(1,(now-t0)/dur);const e=_easeOutCubic(t);
    const cur={};
    for(const sid of sids){
      const {tvals,svals}=startBySid[sid];
      const c={};
      targetPeriodsArr.forEach((p,i)=>{ const sv=svals[i]||0; c[p]=sv+(tvals[i]-sv)*e; });
      cur[sid]=c;
    }
    draw(cur,{scaleMax:targetMax,animating:t<1});
    _chartAnim[canvasId].displayed=cur;
    if(t<1) _chartAnim[canvasId].raf=requestAnimationFrame(frame);
    else _chartAnim[canvasId].raf=null;
  }
  _chartAnim[canvasId].raf=requestAnimationFrame(frame);
}

function renderPersonTrend(){

  refreshTrendControls('p', state.rangeKey, state.personTrendMonth, state.personTrendMode, state.personTrendAllMode);
  const daily={};
  for(const [dk,c] of Object.entries(p.daily_sent||{})) daily[dk]=(daily[dk]||0)+c;
  for(const [dk,c] of Object.entries(p.daily_received||{})) daily[dk]=(daily[dk]||0)+c;
  const monthly={};
  for(const [mk,c] of Object.entries(p.monthly_sent||{})) monthly[mk]=(monthly[mk]||0)+c;
  for(const [mk,c] of Object.entries(p.monthly_received||{})) monthly[mk]=(monthly[mk]||0)+c;
  const s=buildLineSeries(daily, monthly, state.rangeKey, state.personTrendMonth, state.personTrendMode, state.personTrendAllMode);
  animatedDrawTrend('person-trend-canvas', s.data, 'rgb(94,234,212)', s.granularity);
}

function renderGroupTrend(){
  if(!state.groupId||collapseState['g-trend']) return;
  const g=DATA.chat_profiles[state.groupId]||{};
  refreshTrendControls('g', state.rangeKey, state.groupTrendMonth, state.groupTrendMode, state.groupTrendAllMode);
  const bySenderDay=g.activity_by_sender_day||{};
  const bySenderMonth=g.activity_by_sender_month||{};
  if(Object.keys(bySenderDay).length||Object.keys(bySenderMonth).length){
    const s=buildStackedSeries(bySenderDay, bySenderMonth, state.rangeKey, state.groupTrendMonth, state.groupTrendMode, state.groupTrendAllMode);
    animatedDrawStacked('group-trend-canvas', s.bySender, s.granularity, DATA.handles);
  } else {
    // No per-sender data: single-line fallback on total monthly/daily
    const s=buildLineSeries(g.activity_by_day||{}, g.activity_by_month||{}, state.rangeKey, state.groupTrendMonth, state.groupTrendMode, state.groupTrendAllMode);
    const legend=document.getElementById('group-trend-canvas-legend'); if(legend) legend.innerHTML='';

  }
}

// Cached TOP-10 scan using DATA.messages as the canonical source (1:1 only for people)
const _top10Cache={};
const _person1on1Cache={};
function person1on1Counts(pid, rangeKey){
  const cacheKey=pid+'|'+rangeKey;
  if(_person1on1Cache[cacheKey]) return _person1on1Cache[cacheKey];
  const range=rangeFor(rangeKey,DATA.meta.date_min,DATA.meta.date_max);
  let sent=0, recv=0;
  for(const m of DATA.messages){
    const [ts,chatId,,isFromMe]=m;
    if(ts<range.start||ts>range.end) continue;
    const chat=DATA.chats[chatId];
    if(!chat||chat.group||chat.participants.length!==1) continue;
    if(chat.participants[0]!==pid) continue;
    if(isFromMe) sent++; else recv++;
  }
  const out={sent,recv,total:sent+recv};
  _person1on1Cache[cacheKey]=out;
  return out;
}
function computeTop10(rangeKey){
  if(_top10Cache[rangeKey]) return _top10Cache[rangeKey];
  const range=rangeFor(rangeKey,DATA.meta.date_min,DATA.meta.date_max);
  const contactCounts={},sentTo={},receivedFrom={},chatCounts={};
  for(const m of DATA.messages){
    const [ts,chatId,sender,isFromMe]=m;
    if(ts<range.start||ts>range.end) continue;
    const chat=DATA.chats[chatId];
    if(!chat) continue;
    // People: 1:1 chats only (messages to/from them, no group chats)
    if(!chat.group&&chat.participants.length===1){
      const other=chat.participants[0];
      if(isFromMe){
        contactCounts[other]=(contactCounts[other]||0)+1;
        sentTo[other]=(sentTo[other]||0)+1;
      } else {
        contactCounts[other]=(contactCounts[other]||0)+1;
        receivedFrom[other]=(receivedFrom[other]||0)+1;
      }
    }
    if(chat.group) chatCounts[chatId]=(chatCounts[chatId]||0)+1;
  }
  const topPersons=Object.entries(contactCounts)
    .map(([pid,total])=>({pid,name:DATA.handles[pid]||pid,sent:sentTo[pid]||0,recv:receivedFrom[pid]||0,total}))
    .sort((a,b)=>b.total-a.total).slice(0,10);
  const topGroups=Object.entries(chatCounts)
    .map(([gid,total])=>{
      const cp=DATA.chat_profiles[gid]||{};
      const ch=DATA.chats[gid]||{};
      const members=(ch.participants?.length||0)+1;
      return {gid,name:cp.name||ch.name||gid,total,members};
    })
    .sort((a,b)=>b.total-a.total).slice(0,10);
  _top10Cache[rangeKey]={topPersons,topGroups};
  // Seed per-person cache from the same scan so Top 10 and profile match
  for(const p of topPersons){
    _person1on1Cache[p.pid+'|'+rangeKey]={sent:p.sent,recv:p.recv,total:p.total};
  }
  return _top10Cache[rangeKey];
}

// ── Person Lookup ───────────────────────────────────────────────────────
function filterPersonMessages(monthlyObj, start, end){
  let total=0;
  for(const [mk,cnt] of Object.entries(monthlyObj||{})){
    const d=new Date(mk+'-01');
    if(d.getTime()>=start && d.getTime()<=end) total+=cnt;
  }
  return total;
}

function groupProfileHtml(gid){
  const g=DATA.chat_profiles[gid]||{};
  const chat=DATA.chats[gid]||{};
  const range=rangeFor(state.rangeKey, DATA.meta.date_min, DATA.meta.date_max);

  // Filter monthly activity by range
  const filteredActivity={};
  let totalInRange=0;
  for(const [mk,cnt] of Object.entries(g.activity_by_month||{})){
    const d=new Date(mk+'-01').getTime();
    if(d>=range.start&&d<=range.end){filteredActivity[mk]=cnt;totalInRange+=cnt;}
  }

  // Sender breakdown — range-filtered via activity_by_sender_month when available
  const actBySenderMonth=g.activity_by_sender_month||{};
  let senderRanked;
  if(Object.keys(actBySenderMonth).length){
    const senderRangeMap={};
    for(const [sid,monthly] of Object.entries(actBySenderMonth)){
      let tot=0;
      for(const [mk,cnt] of Object.entries(monthly)){
        const d=new Date(mk+'-01').getTime();
        if(d>=range.start&&d<=range.end) tot+=cnt;
      }
      if(tot>0) senderRangeMap[sid]=tot;
    }
    senderRanked=Object.entries(senderRangeMap).sort((a,b)=>b[1]-a[1]);
  } else {
    senderRanked=(g.sender_counts||[]).map(([pid,cnt])=>[pid,cnt]);
  }
  const senderNote=Object.keys(actBySenderMonth).length
    ?(state.rangeKey==='all'?'all-time message count':state.rangeKey+' message count')
    :'all-time message count';
  const topSenderEntry=senderRanked[0];
  const topSenderName=topSenderEntry
    ?(topSenderEntry[0]==='me'?'You':esc(DATA.handles[topSenderEntry[0]]||topSenderEntry[0]))
    :'—';

  const senders=senderRanked.map(([pid,cnt],i)=>{
    const name=pid==='me'?'You':(DATA.handles[pid]||pid);

  const hourCounts=g.hour_counts||Array(24).fill(0);
  const hMax=Math.max(...hourCounts,1);
  const hourStrip=hourCounts.map((v,h)=>hourCellHtml(v,h,hMax)).join('');
  const hourLabels=['12 AM','','','3 AM','','','6 AM','','','9 AM','','','12 PM','','','3 PM','','','6 PM','','','9 PM','',''].map(l=>`<div style="text-align:center;font-family:var(--font-mono);font-size:7px;color:var(--muted)">${l}</div>`).join('');

  const words=g.top_words||[];
  const phrases=g.top_phrases||[];
  const wordCloud=words.length
    ? `<div class="word-cloud">`+words.slice(0,20).map(([w,c])=>`<div class="word-chip"><b>${esc(w)}</b><span class="n">${fmt(c)}</span></div>`).join('')+`</div>`
    : '<div class="empty">No eligible words found in this conversation.</div>';
  const phraseCloud=phrases.length
    ? `<div class="word-cloud">`+phrases.slice(0,15).map(([w,c])=>`<div class="word-chip"><b>${esc(w)}</b><span class="n">${fmt(c)}</span></div>`).join('')+`</div>`
    : '<div class="empty">No eligible phrases found in this conversation.</div>';

  const emojis=g.top_emojis||[];
  const emojiCloud=emojis.length
    ? `<div class="emoji-cloud">`+emojis.map(([e,c])=>`<div class="emoji-chip">${esc(e)}<span class="en">${fmt(c)}</span></div>`).join('')+`</div>`
    : '<div class="empty">No emoji found.</div>';

  const gMode=state.groupTrendMode||'weekly';
  const trendHtml=`
    <div id="g-trend-controls">${trendControlsHtml('g', state.rangeKey, state.groupTrendMonth, gMode, state.groupTrendAllMode)}</div>
    <div class="chart-wrap"><canvas id="group-trend-canvas" style="width:100%;height:140px;"></canvas></div>
    <div id="group-trend-canvas-legend" class="chart-legend"></div>
  `;

  return `
    <div class="profile-header">
      <div class="profile-avatar" style="width:64px;height:64px;font-size:20px">💬</div>
      <div class="profile-name-wrap">

      <div class="hero-stat"><div class="num">${fmt((chat.participants||[]).length+1)}</div><div class="label">Members</div></div>

      <div class="hero-stat"><div class="num">${formatHour(hourCounts.indexOf(Math.max(...hourCounts)))}</div><div class="label">Peak hour</div></div>

// ── Canvas trend chart ──────────────────────────────────────────────────
// granularity: 'yearly' | 'daily' | 'weekly' | 'monthly'
// opts: {scaleMax, animating}
function drawTrend(canvasId, data, color, granularity, opts){
  opts=opts||{}; granularity=granularity||'monthly';
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  if(!ctx) return;
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth, h=canvas.clientHeight;
  canvas.width=w*dpr; canvas.height=h*dpr;
  ctx.scale(dpr,dpr);

  const entries=Object.entries(data||{}).sort((a,b)=>a[0]<b[0]?-1:1);
  const vals=entries.map(e=>e[1]);

  function showEmpty(){
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='#8492A0';ctx.font='13px IBM Plex Mono,monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('No messages during this period.',w/2,h/2);
    canvas.onmousemove=null;canvas.onmouseleave=null;
  }
  if(!entries.length||vals.every(v=>v===0)){showEmpty();return;}

  const maxV=Math.max(opts.scaleMax||0, ...vals, 1);
  function fmtY(v){v=Math.round(v);return v>=1e6?Math.round(v/1e6)+'M':v>=1000?Math.round(v/1000)+'K':String(v);}

  // Dynamic left padding: title zone + tick label zone + gap
  ctx.font='9px IBM Plex Mono,monospace';
  const maxLW=ctx.measureText(fmtY(maxV)).width;
  const padL=Math.ceil(maxLW)+22, padR=10, padT=8, padB=32;
  const pw=w-padL-padR, ph=h-padT-padB;
  const n=entries.length;
  const sx=n>1?pw/(n-1):0;
  const ptX=i=>n>1?(padL+i*sx):(padL+pw/2);
  const ptY=v=>padT+ph-(v/maxV)*ph;

  const isYearly=granularity==='yearly';
  const isWeekly=granularity==='weekly';
  const isDay=granularity==='daily'||granularity==='weekly';
  const multiYear=new Set(entries.map(e=>e[0].slice(0,4))).size>1;

  function fmtLbl(key){
    if(isYearly) return key;
    if(!isDay){
      const [y,mo]=key.split('-').map(Number);
      const abbr=new Date(y,mo-1,1).toLocaleDateString('en-US',{month:'short'});
      return multiYear?`${abbr} '${String(y).slice(2)}`:abbr;
    }
    const [y,m,d]=key.split('-').map(Number);
    return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }
  function fmtTipEntry(key,val){
    if(isYearly) return `${key} — ${fmt(val)} messages`;
    if(isWeekly){
      const [y,m,d]=key.split('-').map(Number);
      const label=new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      return `Week of ${label} — ${fmt(val)} messages`;
    }
    if(isDay){
      const [y,m,d]=key.split('-').map(Number);
      const label=new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      return `${label} — ${fmt(val)} messages`;
    }
    const [y,mo]=key.split('-').map(Number);
    const label=new Date(y,mo-1,1).toLocaleDateString('en-US',{month:'short',year:'numeric'});
    return `${label} — ${fmt(val)} messages`;
  }

  const grad=ctx.createLinearGradient(0,padT,0,padT+ph);
  grad.addColorStop(0,color.replace(')',',0.35)').replace('rgb','rgba'));
  grad.addColorStop(1,color.replace(')',',0.02)').replace('rgb','rgba'));

  const ticks=n<=12?entries.map((_,i)=>i):entries.reduce((a,_,i,arr)=>{
    if(i===0||i===arr.length-1||(i%Math.floor(n/5))===0)a.push(i);return a;
  },[]);
  const yTitle='Messages';
  const xTitle=isYearly?'Year':(isWeekly?'Week':(isDay?'Date':'Month'));

  function drawBase(){
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle='#26313C';ctx.lineWidth=1;
    ctx.fillStyle='#8492A0';ctx.font='9px IBM Plex Mono,monospace';
    ctx.textAlign='right';ctx.textBaseline='middle';
    for(let i=0;i<=2;i++){
      const y=padT+ph*i/2;
      ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(w-padR,y);ctx.stroke();
      const val=maxV*(1-i/2);
      if(val>0)ctx.fillText(fmtY(val),padL-8,y);
    }
    // Area fill
    ctx.beginPath();
    entries.forEach((e,i)=>{const x=ptX(i),y=ptY(e[1]);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
    if(n>1){ctx.lineTo(ptX(n-1),padT+ph);ctx.lineTo(padL,padT+ph);}
    ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    // Line
    if(n>1){
      ctx.beginPath();
      entries.forEach((e,i)=>{const x=ptX(i),y=ptY(e[1]);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
      ctx.strokeStyle=color;ctx.lineWidth=1.6;
      ctx.shadowColor=color.replace(')',',0.5)').replace('rgb','rgba');ctx.shadowBlur=4;ctx.stroke();ctx.shadowBlur=0;
    }
    // Persistent dot for single point
    if(n===1){
      const dx=ptX(0),dy=ptY(entries[0][1]);
      ctx.beginPath();ctx.arc(dx,dy,4.5,0,Math.PI*2);
      ctx.fillStyle=color;ctx.shadowColor=color.replace(')',',0.5)').replace('rgb','rgba');ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(dx,dy,2.5,0,Math.PI*2);ctx.fillStyle='#0D1117';ctx.fill();
    }
    // Tick labels
    ctx.fillStyle='#8492A0';ctx.font=(isYearly?'11':'9')+'px IBM Plex Mono,monospace';ctx.textBaseline='top';
    ticks.forEach(i=>{
      ctx.textAlign=i===0?'left':i===n-1?'right':'center';
      ctx.fillText(fmtLbl(entries[i][0]),ptX(i),padT+ph+4);
    });
    ctx.fillStyle='#8492A0';ctx.font='9px IBM Plex Mono,monospace';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(xTitle,padL+pw/2,h-2);
    ctx.save();
    ctx.translate(9,padT+ph/2);ctx.rotate(-Math.PI/2);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='9px IBM Plex Mono,monospace';ctx.fillStyle='#8492A0';
    ctx.fillText(yTitle,0,0);
    ctx.restore();
  }

  drawBase();

  // During animation, don't wire up hover (restored on the final frame).
  if(opts.animating){ canvas.onmousemove=null; canvas.onmouseleave=null; return; }

  let lastDot=-1;
  canvas.onmousemove=function(e){
    const rect=canvas.getBoundingClientRect();const x=e.clientX-rect.left;
    let idx=sx>0?Math.round((x-padL)/sx):0;idx=Math.max(0,Math.min(n-1,idx));
    showTip(e,fmtTipEntry(entries[idx][0],entries[idx][1]));
    if(idx!==lastDot){
      lastDot=idx;drawBase();
      const dx=ptX(idx),dy=ptY(entries[idx][1]);
      ctx.beginPath();ctx.arc(dx,dy,4.5,0,Math.PI*2);ctx.fillStyle=color;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(dx,dy,2.5,0,Math.PI*2);ctx.fillStyle='#0D1117';ctx.fill();
    }
  };
  canvas.onmouseleave=function(){lastDot=-1;hideTip();drawBase();};
}

// ── Stacked bar chart for group activity by participant ──────────────────
const STACK_COLORS=['#5EEAD4','#F2A65A','#818CF8','#34D399','#F87171','#60A5FA','#94A3B8'];

// granularity: 'yearly' | 'daily' | 'weekly' | 'monthly'
// opts: {scaleMax, animating, order:{topSids, hasOther}}
function drawStackedTrend(canvasId, actBySender, granularity, handles, opts){
  opts=opts||{}; granularity=granularity||'monthly';
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  if(!ctx) return;
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth, h=canvas.clientHeight;
  canvas.width=w*dpr; canvas.height=h*dpr;
  ctx.scale(dpr,dpr);

  const isYearly=granularity==='yearly';
  const isWeekly=granularity==='weekly';
  const isDay=granularity==='daily'||granularity==='weekly';

  // Build period list from the data already passed in
  const allP=new Set();
  for(const m of Object.values(actBySender||{})) for(const p of Object.keys(m)) allP.add(p);
  let periods=Array.from(allP).sort();

  function showEmpty(msg){
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='#8492A0';ctx.font='13px IBM Plex Mono,monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(msg,w/2,h/2);
    canvas.onmousemove=null;canvas.onmouseleave=null;
    const legendEl=document.getElementById(canvasId+'-legend');
    if(legendEl) legendEl.innerHTML='';
  }
  if(!periods.length){showEmpty('No messages during this period.');return;}

  // Participant ordering: use the caller-provided (target) order when
  // animating so the stack doesn't reshuffle frame to frame; else derive it.
  let topSids, hasOther;
  if(opts.order){ topSids=opts.order.topSids; hasOther=opts.order.hasOther; }
  else {
    const senderTotals={};
    for(const [sid,monthly] of Object.entries(actBySender||{}))
      senderTotals[sid]=periods.reduce((s,p)=>s+(monthly[p]||0),0);
    const sorted=Object.entries(senderTotals).sort((a,b)=>b[1]-a[1]);
    topSids=sorted.slice(0,5).map(([s])=>s);
    hasOther=sorted.length>5;
  }
  const allSids=[...topSids,...(hasOther?['other']:[])];

  // Build per-period stacked cumulative arrays
  const stacks=periods.map(p=>{
    const vals=topSids.map(sid=>(actBySender[sid]||{})[p]||0);
    const topSum=vals.reduce((s,v)=>s+v,0);
    const allSum=Object.values(actBySender||{}).reduce((s,m)=>s+(m[p]||0),0);
    const otherVal=hasOther?Math.max(0,allSum-topSum):0;
    const allVals=[...vals,otherVal];
    const cum=[0];
    for(const v of allVals) cum.push(cum[cum.length-1]+v);
    return {vals:allVals,cum};
  });

  const maxV=Math.max(opts.scaleMax||0, ...stacks.map(s=>s.cum[s.cum.length-1]), 1);
  if(stacks.every(s=>s.cum[s.cum.length-1]===0)){showEmpty('No messages during this period.');return;}

  function fmtY(v){v=Math.round(v);return v>=1e6?Math.round(v/1e6)+'M':v>=1000?Math.round(v/1000)+'K':String(v);}
  ctx.font='9px IBM Plex Mono,monospace';
  const maxLW=ctx.measureText(fmtY(maxV)).width;
  const padL=Math.ceil(maxLW)+22, padR=10, padT=8, padB=32;
  const pw=w-padL-padR, ph=h-padT-padB;
  const n=periods.length;
  const ptX=i=>n>1?(padL+i*pw/(n-1)):(padL+pw/2);
  const ptY=v=>padT+ph-(v/maxV)*ph;

  const multiYear=new Set(periods.map(p=>p.slice(0,4))).size>1;
  function fmtLbl(p){
    if(isYearly) return p;
    if(!isDay){
      const [y,mo]=p.split('-').map(Number);
      const abbr=new Date(y,mo-1,1).toLocaleDateString('en-US',{month:'short'});
      return multiYear?`${abbr} '${String(y).slice(2)}`:abbr;
    }
    const [y,m,d]=p.split('-').map(Number);
    return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }
  function fmtPeriodTip(p){
    if(isYearly) return p;
    if(!isDay){
      const [y,mo]=p.split('-').map(Number);
      return new Date(y,mo-1,1).toLocaleDateString('en-US',{month:'short',year:'numeric'});
    }
    const [y,m,d]=p.split('-').map(Number);
    const label=new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    return isWeekly?`Week of ${label}`:label;
  }

  function hexRgba(hex,a){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  ctx.clearRect(0,0,w,h);

  // Gridlines + Y labels
  ctx.strokeStyle='#26313C';ctx.lineWidth=1;
  ctx.fillStyle='#8492A0';ctx.font='9px IBM Plex Mono,monospace';
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(let i=0;i<=2;i++){
    const gy=padT+ph*i/2;
    ctx.beginPath();ctx.moveTo(padL,gy);ctx.lineTo(w-padR,gy);ctx.stroke();
    const val=maxV*(1-i/2);
    if(val>0)ctx.fillText(fmtY(val),padL-8,gy);
  }

  // Stacked areas (drawn bottom to top so upper series overlays lower boundary)
  for(let s=allSids.length-1;s>=0;s--){
    const col=STACK_COLORS[s%STACK_COLORS.length];
    ctx.beginPath();
    for(let i=0;i<n;i++){const x=ptX(i),y=ptY(stacks[i].cum[s+1]);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    for(let i=n-1;i>=0;i--) ctx.lineTo(ptX(i),ptY(stacks[i].cum[s]));
    ctx.closePath();
    ctx.fillStyle=hexRgba(col,0.65);ctx.fill();
    // Boundary line
    ctx.beginPath();
    for(let i=0;i<n;i++){const x=ptX(i),y=ptY(stacks[i].cum[s+1]);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.strokeStyle=col;ctx.lineWidth=1.2;ctx.stroke();
  }

  // X tick labels
  const ticks=n<=12?periods.map((_,i)=>i):periods.reduce((a,_,i,arr)=>{
    if(i===0||i===arr.length-1||(i%Math.floor(n/5))===0)a.push(i);return a;
  },[]);
  ctx.fillStyle='#8492A0';ctx.font=(isYearly?'11':'9')+'px IBM Plex Mono,monospace';ctx.textBaseline='top';
  ticks.forEach(i=>{
    ctx.textAlign=i===0?'left':i===n-1?'right':'center';
    ctx.fillText(fmtLbl(periods[i]),ptX(i),padT+ph+4);
  });
  ctx.fillStyle='#8492A0';ctx.font='9px IBM Plex Mono,monospace';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(isYearly?'Year':(isWeekly?'Week':(isDay?'Date':'Month')),padL+pw/2,h-2);
  ctx.save();ctx.translate(9,padT+ph/2);ctx.rotate(-Math.PI/2);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Messages',0,0);ctx.restore();

  // Legend
  const legendEl=document.getElementById(canvasId+'-legend');
  if(legendEl){
    legendEl.innerHTML=allSids.map((sid,i)=>{
      const name=sid==='other'?'Other':(sid==='me'?'You':(handles[sid]||sid));
      return `<div class="chart-legend-item"><div class="chart-legend-dot" style="background:${STACK_COLORS[i%STACK_COLORS.length]}"></div>${esc(name)}</div>`;
    }).join('');
  }

  // During animation, don't wire up hover (restored on the final frame).
  if(opts.animating){ canvas.onmousemove=null; canvas.onmouseleave=null; return; }

  // Hover tooltip — vertical layout; detect which stack segment the cursor is over.
  const hoverSx=n>1?pw/(n-1):0;
  canvas.onmousemove=function(e){
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left, y=e.clientY-rect.top;
    const i=Math.max(0,Math.min(n-1,hoverSx>0?Math.round((x-padL)/hoverSx):0));
    const stack=stacks[i];
    const total=stack.cum[stack.cum.length-1];
    if(!total){ hideTip(); return; }

    // Which sender segment is under the cursor?
    let activeIdx=-1;
    if(y>=ptY(total)&&y<=ptY(0)){
      const valAtY=maxV*(1-(y-padT)/ph);
      for(let j=0;j<allSids.length;j++){
        if(valAtY>=stack.cum[j]&&valAtY<stack.cum[j+1]){ activeIdx=j; break; }
      }
    }

    const tipLines=[];
    allSids.forEach((sid,j)=>{
      const v=stack.vals[j]; if(!v) return;
      const name=sid==='other'?'Other':(sid==='me'?'You':(handles[sid]||sid));
      tipLines.push(`${name}: ${fmt(v)}`);
    });
    showStackTip(e, fmtPeriodTip(periods[i]), tipLines, activeIdx, total);
    canvas.style.cursor=activeIdx>=0?'pointer':'crosshair';
  };
  canvas.onmouseleave=function(){ hideTip(); canvas.style.cursor=''; };
}

function setLookupTab(t){
  if(t===state.tab) return;
  state.tab=t;
  switchLookupTab();
}

function updateLookupTabButtons(){
  document.querySelectorAll('.main-tab[data-lookup-tab]').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.lookupTab===state.tab);
  });
}

function invalidateLookupTabs(){
  state._lookupTabBuilt={};
}

function showLookupTab(tab){
  if(!state._lookupTabBuilt) state._lookupTabBuilt={};
  const pane=document.getElementById('lookup-tab-pane-'+tab);
  if(!pane) return;
  const isNew=!state._lookupTabBuilt[tab];
  if(isNew){
    pane.innerHTML=tab==='person'?buildPersonTabContent():buildGroupTabContent();
    state._lookupTabBuilt[tab]=true;
    if(tab==='person'&&state.personId&&!collapseState['p-trend']) requestAnimationFrame(renderPersonTrend);
    if(tab==='group'&&state.groupId&&!collapseState['g-trend']) requestAnimationFrame(renderGroupTrend);
  }
  document.querySelectorAll('.lookup-tab-pane').forEach(p=>{ p.style.display='none'; });
  pane.style.display='block';
  updateLookupTabButtons();
  if(state._focusPerson&&tab==='person'){
    const inp=document.getElementById('lookup-search');
    if(inp){inp.focus();if(state._personCursor!=null)inp.setSelectionRange(state._personCursor,state._personCursor);}
    state._focusPerson=false;
  }
  if(state._focusGroup&&tab==='group'){
    const inp=document.getElementById('group-search');
    if(inp){inp.focus();if(state._groupCursor!=null)inp.setSelectionRange(state._groupCursor,state._groupCursor);}
    state._focusGroup=false;
  }
}

function switchLookupTab(){
  showLookupTab(state.tab);
}

function buildPersonTabContent(){
  const pq=(state.personQuery||'').trim().toLowerCase();
  let personResults=[];
  if(!state.personId&&pq){
    personResults=Object.entries(DATA.handles).filter(([id,name])=>{
      if(name.toLowerCase().includes(pq)) return true;
      return (DATA.handle_contacts[id]||[]).some(a=>a.toLowerCase().includes(pq));
    }).slice(0,8);
  }
  return `
    <div class="section">
      <div class="section-head-static"><div class="section-title">Person Lookup</div><div class="section-note">search by name, number, or email</div></div>
      <div class="panel lookup-panel">
        <div class="lookup-search-wrap">
          <input id="lookup-search" type="text" placeholder="Search a name, number, or email…"
            value="${esc(state.personQuery||'')}" oninput="state.personQuery=this.value;state.personId=null;state._focusPerson=true;state._personCursor=this.selectionStart;render()" />
          ${state.personId?`<button class="lookup-clear" onclick="state.personId=null;state.personQuery='';state._focusPerson=true;render()">Clear</button>`:''}
        </div>
        ${personResults.length?`<div class="lookup-results">`+personResults.map(([id,name])=>`
          <div class="lookup-result-row" onclick="selectPerson('${id}','${esc(name)}')">
            ${avatarHtml(id,'36px')}
            <div><div class="lookup-result-name">${esc(name)}</div>
            <div class="lookup-result-sub">${esc((DATA.handle_contacts[id]||[]).join(', '))}</div></div>
          </div>`).join('')+`</div>`:pq&&!state.personId?`<div class="empty">No matches.</div>`:''}
      </div>
    </div>
    ${state.personId?personProfileHtml(state.personId):(!pq?`
    <div class="section">
      <div class="section-head-static">
        <div class="section-title" style="font-size:15px;color:var(--muted);">Top 10 People</div>
        <div class="section-note">by 1:1 messages · ${state.rangeKey==='all'?'all-time':state.rangeKey}</div>
      </div>
      <div class="panel">${top10PersonsHtml()}</div>
    </div>`:'') }
  `;
}

function buildGroupTabContent(){
  const gq=(state.groupQuery||'').trim().toLowerCase();
  let groupResults=[];
  if(!state.groupId&&gq){
    groupResults=Object.entries(DATA.chat_profiles||{}).filter(([id,p])=>p.name.toLowerCase().includes(gq)).slice(0,8);
  }
  return `
    <div class="section">
      <div class="section-head-static"><div class="section-title">Group Chat Lookup</div><div class="section-note">search by group name</div></div>
      <div class="panel lookup-panel">
        <div class="lookup-search-wrap">
          <input id="group-search" type="text" placeholder="Search a group chat name…"
            value="${esc(state.groupQuery||'')}" oninput="state.groupQuery=this.value;state.groupId=null;state._focusGroup=true;state._groupCursor=this.selectionStart;render()" />
          ${state.groupId?`<button class="lookup-clear" onclick="state.groupId=null;state.groupQuery='';state._focusGroup=true;render()">Clear</button>`:''}
        </div>
        ${groupResults.length?`<div class="lookup-results">`+groupResults.map(([id,p])=>`
          <div class="lookup-result-row" onclick="selectGroup('${id}','${esc(p.name)}')">
            <div class="lookup-result-avatar" style="font-size:18px">💬</div>
            <div><div class="lookup-result-name">${esc(p.name)}</div>
            <div class="lookup-result-sub">${fmt(p.total)} messages · ${(DATA.chats[id]||{}).participants?.length+1||'?'} members</div></div>
          </div>`).join('')+`</div>`:gq&&!state.groupId?`<div class="empty">No matches.</div>`:''}
      </div>
    </div>
    ${state.groupId?groupProfileHtml(state.groupId):(!gq?`
    <div class="section">
      <div class="section-head-static">
        <div class="section-title" style="font-size:15px;color:var(--muted);">Top 10 Group Chats</div>
        <div class="section-note">by messages · ${state.rangeKey==='all'?'all-time':state.rangeKey}</div>
      </div>
      <div class="panel">${top10GroupsHtml()}</div>
    </div>`:'') }
  `;
}

// ── Main render ─────────────────────────────────────────────────────────
function render(){
  invalidateLookupTabs();
  const minTs=DATA.meta.date_min, maxTs=DATA.meta.date_max;
  const years=[...new Set(Object.values(DATA.person_profiles||{}).flatMap(p=>Object.keys(p.monthly_sent||{})).map(k=>k.slice(0,4)))].sort((a,b)=>b-a);
  const rangeButtons=[{key:'all',label:'All time'},...years.map(y=>({key:y,label:y}))].map(r=>
    `<button class="${state.rangeKey===r.key?'active':''}" onclick="setLookupRange('${r.key}')">${r.label}</button>`
  ).join('');

  document.getElementById('root').innerHTML=`
    <div class="wrap">
      <div class="back-nav"><a href="iMessage_Dashboard.html">← Back to Dashboard</a></div>
      <div class="statement-head">
        <div>
          <div class="eyebrow">Your personal report</div>
          <h1>iMessages Wrapped</h1>
          <div style="font-family:var(--font-mono);font-size:13px;color:var(--teal);margin-top:2px;">Search People &amp; Groups</div>
          <div class="subline">${new Date(minTs).toLocaleDateString()} — ${new Date(maxTs).toLocaleDateString()}</div>
        </div>
        <div class="range-control">${rangeButtons}</div>
      </div>

      <div class="main-tabs">
        <button class="main-tab${state.tab==='person'?' active':''}" data-lookup-tab="person" onclick="setLookupTab('person')">Person</button>
        <button class="main-tab${state.tab==='group'?' active':''}" data-lookup-tab="group" onclick="setLookupTab('group')">Group Chat</button>
      </div>

      <div id="lookup-tab-pane-person" class="lookup-tab-pane"></div>
      <div id="lookup-tab-pane-group" class="lookup-tab-pane"></div>

      <footer>Lookup page. Data was extracted locally by build_dashboard.py and never left your machine.</footer>
    </div>
  `;

  showLookupTab(state.tab);

  if(new URLSearchParams(location.search).has('debug')){
    if(state.personId){
      const p=DATA.person_profiles[state.personId]||{};
      const range=rangeFor(state.rangeKey,DATA.meta.date_min,DATA.meta.date_max);
      const contacts=DATA.handle_contacts[state.personId]||[];
      console.groupCollapsed(`[Lookup Debug] Person: ${DATA.handles[state.personId]||state.personId}`);
      console.log('Canonical ID:', state.personId);
      console.log('Matched handles/addresses:', contacts);
      console.log('Sent (all-time):', p.sent);
      console.log('Received (all-time):', p.received);
      console.log('Applied range:', new Date(range.start).toLocaleDateString(), '–', new Date(range.end).toLocaleDateString());
      console.groupEnd();
    }
    if(state.groupId){
      const g=DATA.chat_profiles[state.groupId]||{};
      const chat=DATA.chats[state.groupId]||{};
      const range=rangeFor(state.rangeKey,DATA.meta.date_min,DATA.meta.date_max);
      console.groupCollapsed(`[Lookup Debug] Group: ${g.name||state.groupId}`);
      console.log('Canonical ID:', state.groupId);
      console.log('Participants:', chat.participants);
      console.log('Total messages (all-time):', g.total);
      console.log('Applied range:', new Date(range.start).toLocaleDateString(), '–', new Date(range.end).toLocaleDateString());
      console.log('Sender counts:', g.sender_counts);
      console.groupEnd();
    }
  }
}

render();
</script>
</body>
</html>
