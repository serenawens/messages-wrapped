<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>iMessages Wrapped</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0D1117;
    --panel:#141B22;
    --panel-2:#1A232C;
    --border:#26313C;
    --text:#E7EDF3;
    --muted:#8492A0;
    --muted-2:#5A6B78;
    --teal:#5EEAD4;
    --amber:#F2A65A;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:var(--font-body);}
  ::selection{background:var(--teal);color:#0D1117;}
  a{color:var(--teal);}

  .wrap{max-width:1120px;margin:0 auto;padding:28px 20px 80px;}

  /* Header / statement bar */
  .statement-head{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid var(--border);padding-bottom:18px;margin-bottom:22px;
    flex-wrap:wrap;gap:16px;
  }
  .eyebrow{
    font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;color:var(--teal);
    text-transform:uppercase;margin-bottom:6px;
  }
  h1{font-family:var(--font-display);font-weight:600;font-size:30px;margin:0;letter-spacing:-0.01em;}
  .subline{font-family:var(--font-mono);color:var(--muted);font-size:12.5px;margin-top:6px;}

  .range-control{
    display:flex;gap:2px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:3px;
  }
  .range-control button{
    font-family:var(--font-mono);font-size:11.5px;color:var(--muted);background:transparent;border:none;
    padding:7px 12px;border-radius:6px;cursor:pointer;letter-spacing:.03em;
  }
  .range-control button.active{background:var(--panel-2);color:var(--teal);}
  .range-control button:hover:not(.active){color:var(--text);}

  /* Hero stats */
  .hero-row{
    display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);
    border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:34px;
  }
  .hero-stat{background:var(--panel);padding:18px 20px;}
  .hero-stat .num{font-family:var(--font-mono);font-size:28px;font-weight:600;color:var(--text);line-height:1;}
  .hero-stat .num.teal{color:var(--teal);}
  .hero-stat .num.amber{color:var(--amber);}
  .hero-stat .label{font-size:11.5px;color:var(--muted);margin-top:8px;text-transform:uppercase;letter-spacing:.06em;}

  .main-tabs{display:flex;gap:28px;border-bottom:1px solid var(--border);margin-bottom:28px;}

  .section-head-static{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}

  .lookup-panel{padding:14px;}
  .lookup-search-wrap{display:flex;gap:10px;align-items:center;}
  #lookup-search{
    flex:1;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 12px;
  }
  #lookup-search:focus{outline:none;border-color:var(--teal);}
  .lookup-clear{
    font-family:var(--font-mono);font-size:11px;color:var(--muted);background:transparent;
    border:1px solid var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;
  }
  .lookup-clear:hover{color:var(--text);}
  .lookup-results{margin-top:10px;border-top:1px solid var(--border);}
  .lookup-result-row{padding:10px 4px;border-bottom:1px solid var(--border);cursor:pointer;}
  .lookup-result-row:last-child{border-bottom:none;}
  .lookup-result-row:hover{background:var(--panel-2);}
  .lookup-result-name{font-size:14px;color:var(--text);}
  .lookup-result-sub{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:2px;}

  .lookup-profile-head{margin:30px 0 14px;}
  .lookup-profile-name{font-family:var(--font-display);font-size:22px;font-weight:600;}
  .lookup-profile-sub{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:4px;}

  .reply-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px;}
  .reply-card{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;}
  .reply-label{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
  .reply-value{font-family:var(--font-mono);font-size:22px;font-weight:600;}
  .reply-value.teal{color:var(--teal);}
  .reply-value.amber{color:var(--amber);}

  .hour-strip{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;padding:14px;}
  .hour-cell{aspect-ratio:1;border-radius:2px;background:var(--panel-2);}

  .gp-stat{padding:16px;font-size:14px;color:var(--text);}
  .gp-num{font-family:var(--font-mono);font-size:20px;font-weight:600;color:var(--teal);margin-right:6px;}

  /* Emoji chip cloud */
  .emoji-cloud{display:flex;flex-wrap:wrap;gap:8px;padding:14px;}
  .emoji-chip{font-size:15px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;display:flex;align-items:center;gap:6px;}
  .emoji-chip .en{font-family:var(--font-mono);font-size:11px;color:var(--muted);}

  /* Year mini-toggle (for emoji/length sections) */
  .year-pills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
  .year-pill{font-family:var(--font-mono);font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--border);padding:5px 10px;border-radius:20px;cursor:pointer;}
  .year-pill.active{color:var(--teal);border-color:var(--teal);}

  /* Message length stats grid */
  .length-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px;}
  .length-card{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:14px;}
  .length-label{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
  .length-value{font-family:var(--font-mono);font-size:20px;font-weight:600;color:var(--text);}
  .length-value.teal{color:var(--teal);}
  .length-value.amber{color:var(--amber);}

  /* Longest messages */
  .long-msg-row{padding:12px;border-bottom:1px solid var(--border);}
  .long-msg-row:last-child{border-bottom:none;}
  .long-msg-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;gap:8px;flex-wrap:wrap;}
  .long-msg-chat{font-family:var(--font-mono);font-size:11px;color:var(--teal);}
  .long-msg-date{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
  .long-msg-preview{font-size:13px;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word;}
  .long-msg-expand{font-family:var(--font-mono);font-size:11px;color:var(--teal);cursor:pointer;margin-top:6px;background:none;border:none;padding:0;}

  /* Chart canvas hover dot */
  .chart-canvas-wrap{position:relative;}
  #chart-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);pointer-events:none;display:none;transform:translate(-50%,-50%);}

  /* Legend on top 10 panel */
  .panel-legend{display:flex;gap:14px;padding:10px 12px 2px;font-family:var(--font-mono);font-size:11px;color:var(--muted);}
  .panel-legend .dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}

  /* GP type list */
  .gp-type-list{padding:8px 12px 4px;}
  .gp-type-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);}
  .gp-type-row:last-child{border-bottom:none;}
  .gp-type-name{font-size:13px;color:var(--text);flex:1;}
  .gp-type-count{font-family:var(--font-mono);font-size:12px;color:var(--muted);}

  .main-tab{
    font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--muted);
    background:transparent;border:none;padding:0 0 12px;cursor:pointer;
    border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .main-tab.active{color:var(--teal);border-bottom-color:var(--teal);}
  .main-tab:hover:not(.active){color:var(--text);}
  .main-tab-divider{width:1px;background:var(--border);margin:0 4px 12px;align-self:stretch;flex-shrink:0;}
  .main-tab-link{
    font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--muted);
    text-decoration:none;padding:0 0 12px;border-bottom:2px solid transparent;margin-bottom:-1px;
    display:inline-flex;align-items:center;gap:5px;
  }
  .main-tab-link:hover{color:var(--teal);}

  /* Sections */
  .section{margin-bottom:38px;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;cursor:pointer;user-select:none;}
  .section-head:hover .section-title{color:var(--teal);}
  .section-head-left{display:flex;align-items:baseline;gap:8px;}
  .chevron{font-size:10px;color:var(--muted);display:inline-block;width:10px;}
  .section-title{font-family:var(--font-display);font-size:18px;font-weight:600;}
  .section-note{font-family:var(--font-mono);font-size:11px;color:var(--muted-2);color:var(--muted);}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:6px;}

  /* Ranked leaderboard rows */
  .rank-row{
    display:grid;grid-template-columns:28px 1fr 200px 64px;align-items:center;gap:12px;
    padding:10px 12px;border-bottom:1px solid var(--border);cursor:default;
  }
  .rank-row:last-child{border-bottom:none;}
  .rank-row.clickable{cursor:pointer;}
  .rank-row.clickable:hover{background:var(--panel-2);}
  .rank-idx{font-family:var(--font-mono);font-size:12px;color:var(--muted);}
  .rank-name{font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rank-name .tag{font-family:var(--font-mono);font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:1px 5px;margin-left:8px;vertical-align:middle;}
  .rank-bar-track{height:6px;background:var(--panel-2);border-radius:3px;overflow:hidden;}
  .rank-bar-fill{height:100%;background:var(--teal);border-radius:3px;}
  .rank-bar-fill-wrap{display:flex;height:100%;}
  .rank-bar-fill.sent{background:var(--teal);border-radius:3px 0 0 3px;}
  .rank-bar-fill.received{background:var(--amber);border-radius:0 3px 3px 0;}
  .rank-count{font-family:var(--font-mono);font-size:13px;color:var(--text);text-align:right;}

  .subpanel{background:var(--panel-2);margin:0 12px 8px;border-radius:8px;padding:10px 12px;border:1px solid var(--border);}
  .subpanel .rank-row{grid-template-columns:20px 1fr 140px 50px;padding:7px 4px;}
  .subpanel .rank-bar-fill{background:var(--amber);}

  /* Two column grid */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
  .grid-2 .section{height:100%;}
  @media (max-width:820px){.grid-2{grid-template-columns:1fr;}.hero-row{grid-template-columns:repeat(2,1fr);}}

  /* Activity chart */
  .chart-wrap{padding:16px 14px 8px;}
  canvas{max-width:100%;}

  /* Heat grid */
  .heat-wrap{padding:16px 14px;}
  .heat-grid{display:grid;grid-template-columns:32px repeat(24,1fr);gap:2px;font-family:var(--font-mono);font-size:9px;color:var(--muted);}
  .heat-label{display:flex;align-items:center;justify-content:flex-end;padding-right:4px;}
  .heat-cell{aspect-ratio:1;border-radius:2px;background:var(--panel-2);cursor:default;}
  .heat-hour-label{text-align:center;font-size:8px;color:var(--muted-2);color:var(--muted);}

  .app-tooltip{
    position:fixed;pointer-events:none;display:none;z-index:1000;
    background:var(--panel-2);border:1px solid var(--border);border-radius:6px;
    padding:6px 10px;font-family:var(--font-mono);font-size:11px;color:var(--text);
    white-space:nowrap;
  }

  /* Vocabulary tabs */
  .tabs{display:flex;gap:4px;margin-bottom:10px;}
  .tab-btn{font-family:var(--font-mono);font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--border);
    padding:6px 12px;border-radius:6px;cursor:pointer;}
  .tab-btn.active{color:var(--teal);border-color:var(--teal);}
  .word-cloud{display:flex;flex-wrap:wrap;gap:8px 10px;padding:16px;}
  .word-chip{font-family:var(--font-mono);color:var(--text);background:var(--panel-2);border:1px solid var(--border);
    border-radius:6px;padding:4px 9px;}
  .word-chip b{color:var(--teal);font-weight:600;}
  .word-chip .n{color:var(--muted);font-size:10px;margin-left:5px;}

  /* Disparity rows */
  .disparity-row{padding:12px;border-bottom:1px solid var(--border);}
  .disparity-row:last-child{border-bottom:none;}
  .disparity-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .disparity-name{font-size:13.5px;color:var(--text);}
  .disparity-note{font-family:var(--font-mono);font-size:11px;}
  .disparity-note.you{color:var(--teal);}
  .disparity-note.them{color:var(--amber);}
  .disparity-bars{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--panel-2);}
  .disparity-bars .seg-you{background:var(--teal);height:100%;}
  .disparity-bars .seg-them{background:var(--amber);height:100%;}
  .disparity-counts{display:flex;gap:14px;margin-top:6px;font-family:var(--font-mono);font-size:10.5px;color:var(--muted);}
  .disparity-counts .you{color:var(--teal);}
  .disparity-counts .them{color:var(--amber);}

  /* Group chat spotlight */
  .spotlight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media (max-width:820px){.spotlight-grid{grid-template-columns:1fr;}}
  .spotlight-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .spotlight-title{font-size:14px;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .spotlight-sub{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:12px;}
  .spotlight-sender{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .spotlight-sender .n{font-size:12.5px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .spotlight-sender .track{width:70px;height:5px;background:var(--panel-2);border-radius:3px;overflow:hidden;}
  .spotlight-sender .fill{height:100%;background:var(--teal);}
  .spotlight-sender .c{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:34px;text-align:right;}
  .spotlight-words{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
  .spotlight-chip{font-family:var(--font-mono);font-size:10.5px;color:var(--amber);background:var(--panel-2);border-radius:4px;padding:2px 7px;}

  .tab-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;}

  .legend-row{display:flex;gap:14px;padding:10px 14px 0;font-family:var(--font-mono);font-size:11px;color:var(--muted);}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .legend-item .dot{width:8px;height:8px;border-radius:2px;display:inline-block;}
  .dot-you{background:var(--teal);}
  .dot-them{background:var(--amber);}

  .empty{padding:30px;text-align:center;color:var(--muted);font-family:var(--font-mono);font-size:12.5px;}
  footer{margin-top:50px;padding-top:16px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:10.5px;color:var(--muted);}
</style>
</head>
<body>
<div id="root"></div>
<div id="app-tooltip" class="app-tooltip"></div>

<script type="text/plain" id="data-blob">__IMESSAGE_DATA__</script>

<script>
const DATA = JSON.parse(document.getElementById('data-blob').textContent);

const state = {
  rangeKey: 'all', vocabAudience: 'overall', vocabGram: 'unigrams', openChat: null, collapsed: {},
  mainTab: 'people-groups', lookupQuery: '', lookupPersonId: null, _focusLookup: false, _lookupCursor: null,
  emojiYear: 'all', emojiAud: 'overall',
  lenYear: 'all',
  longestSide: 'sent', longestExpanded: {},
};

function setMainTab(t){ state.mainTab = t; render(); }

function toggleSection(id){
  state.collapsed[id] = !state.collapsed[id];
  render();
}

function sectionChevron(id){
  return `<span class="chevron">${state.collapsed[id] ? '&#9656;' : '&#9662;'}</span>`;
}

function sectionHtml(id, title, note, bodyHtml){
  const collapsed = !!state.collapsed[id];
  return `<div class="section">
    <div class="section-head" onclick="toggleSection('${id}')">
      <div class="section-head-left">${sectionChevron(id)}<div class="section-title">${title}</div></div>
      <div class="section-note">${note}</div>
    </div>
    ${collapsed ? '' : bodyHtml}
  </div>`;
}

function fmt(n){ return Math.round(n).toLocaleString('en-US'); }

function esc(s){
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function dayKey(ts){
  const d = new Date(ts);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function buildRanges(){
  const years = new Set();
  for(const m of DATA.messages){ years.add(new Date(m[0]).getFullYear()); }
  const sorted = Array.from(years).sort((a,b)=>b-a);
  return [{key:'all', label:'All time'}, ...sorted.map(y=>({key:String(y), label:String(y)}))];
}
const RANGES = buildRanges();

function computeRangeBounds(key, minTs, maxTs){
  if(key==='all') return {start:minTs, end:maxTs};
  const year = parseInt(key,10);
  const start = new Date(year, 0, 1, 0, 0, 0, 0).getTime();
  const end = new Date(year, 11, 31, 23, 59, 59, 999).getTime();
  return {start, end};
}

function computeAggregates(range){
  const {start,end} = range;
  const contactCounts = {};
  const sentTo = {};
  const receivedFrom = {};
  const has1to1 = {};
  const chatCounts = {};
  const chatParticipant = {};
  const byDay = {};
  const heat = Array.from({length:7},()=>Array(24).fill(0));
  let sent=0, received=0;

  for(const m of DATA.messages){
    const [ts, chatId, sender, isFromMe] = m;
    if(ts < start || ts > end) continue;
    const chat = DATA.chats[chatId];
    if(!chat) continue;

    if(isFromMe){ sent++; } else { received++; }

    chatCounts[chatId] = (chatCounts[chatId]||0) + 1;
    const who = isFromMe ? 'me' : String(sender);
    if(!chatParticipant[chatId]) chatParticipant[chatId] = {};
    chatParticipant[chatId][who] = (chatParticipant[chatId][who]||0) + 1;

    if(!chat.group && chat.participants.length===1){
      const other = chat.participants[0];
      has1to1[other] = true;
      if(isFromMe){
        contactCounts[other] = (contactCounts[other]||0) + 1;
        sentTo[other] = (sentTo[other]||0) + 1;
      } else if(sender != null){
        contactCounts[other] = (contactCounts[other]||0) + 1;
        receivedFrom[other] = (receivedFrom[other]||0) + 1;
      }
    }

    const dk = dayKey(ts);
    byDay[dk] = (byDay[dk]||0)+1;
    const d = new Date(ts);
    heat[d.getDay()][d.getHours()]++;
  }

  const topContacts = Object.entries(contactCounts)
    .map(([id,count])=>({id, name: DATA.handles[id] || id, count, sent: sentTo[id]||0, received: receivedFrom[id]||0}))
    .sort((a,b)=>b.count-a.count).slice(0,10);

  const topChats = Object.entries(chatCounts)
    .filter(([id])=>DATA.chats[id] && DATA.chats[id].group)
    .map(([id,count])=>({id, chat:DATA.chats[id], count, participants: chatParticipant[id]}))
    .sort((a,b)=>b.count-a.count).slice(0,10);

  const disparities = Object.keys(has1to1)
    .map(id=>{
      const you = sentTo[id]||0, them = receivedFrom[id]||0;
      const total = you+them;
      return {id, name: DATA.handles[id]||id, you, them, total, diff: Math.abs(you-them)};
    })
    .filter(d=>d.total >= 4)
    .sort((a,b)=>b.diff-a.diff).slice(0,8);

  const dayEntries = Object.entries(byDay).sort((a,b)=>a[0]<b[0]?-1:1);

  return {sent, received, total: sent+received, topContacts, topChats, disparities, dayEntries, heat};
}

function setLookupQuery(el){
  state.lookupQuery = el.value;
  state.lookupPersonId = null;
  state._focusLookup = true;
  state._lookupCursor = el.selectionStart;
  render();
}

function selectLookupPerson(id){
  state.lookupPersonId = id;
  state.lookupQuery = DATA.handles[id] || id;
  state._focusLookup = false;
  render();
}

function clearLookupPerson(){
  state.lookupPersonId = null;
  state.lookupQuery = '';
  state._focusLookup = true;
  state._lookupCursor = 0;
  render();
}

function formatDuration(ms){
  if(ms == null) return '—';
  const mins = ms/60000;
  if(mins < 1) return '<1m';
  if(mins < 60) return Math.round(mins)+'m';
  const hours = mins/60;
  if(hours < 24){
    const h = Math.floor(hours);
    const m = Math.round(mins - h*60);
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  }
  return Math.round(hours/24)+'d';
}

function formatHourLabel(h){
  const period = h < 12 ? 'AM' : 'PM';
  let displayHour = h % 12;
  if(displayHour === 0) displayHour = 12;
  return `${displayHour} ${period}`;
}

function getPersonProfile(personId){
  // Use precomputed profile from Python — instant, no message iteration
  const p = (DATA.person_profiles || {})[personId] || {};
  const name = DATA.handles[personId] || personId;
  const hourCounts = p.hour_counts || Array(24).fill(0);
  const peakHour = hourCounts.indexOf(Math.max(...hourCounts));
  return {
    id: personId, name,
    sent: p.sent || 0,
    received: p.received || 0,
    hasOneOnOne: (p.sent||0) + (p.received||0) > 0,
    yourResponseMs: p.your_response_ms || null,
    theirResponseMs: p.their_response_ms || null,
    yourResponsePcts: p.your_response_pcts || {},
    theirResponsePcts: p.their_response_pcts || {},
    peakHour,
    hourCounts,
    groupChats: p.group_chats || [],
    gamePigeon: p.game_pigeon || 0,
    gamePigeonTypes: p.game_pigeon_types || [],
    topWords: p.top_words || [],
    emojis_sent: p.emojis_sent || [],
    emojis_received: p.emojis_received || [],
    avgCharsSent: p.avg_chars_sent,
    avgCharsReceived: p.avg_chars_received,
  };
}

function hourlyStripHtml(hourCounts){
  const max = Math.max(...hourCounts,1);
  let cells = '';
  for(let h=0;h<24;h++){
    const alpha = hourCounts[h]/max;
    const tip = `${formatHourLabel(h)} — ${fmt(hourCounts[h])} message${hourCounts[h]===1?'':'s'}`;
    cells += `<div class="hour-cell" style="background:rgba(94,234,212,${(0.06+alpha*0.85).toFixed(3)})"
      data-tip="${esc(tip)}" onmouseenter="showTip(event,this.dataset.tip)" onmousemove="moveTip(event)" onmouseleave="hideTip()"></div>`;
  }
  const labels = ['12a','','','3a','','','6a','','','9a','','','12p','','','3p','','','6p','','','9p','',''];
  const labelRow = labels.map(l=>`<div style="text-align:center;font-family:var(--font-mono);font-size:8px;color:var(--muted)">${l}</div>`).join('');
  return `<div class="hour-strip">${cells}</div><div style="display:grid;grid-template-columns:repeat(24,1fr);padding:0 14px 8px">${labelRow}</div>`;
}

function responsePctsHtml(pcts, cls){
  if(!pcts || !Object.keys(pcts).length) return '<div class="empty">Not enough data.</div>';
  return Object.entries(pcts).map(([k,v])=>
    `<div class="gp-type-row"><div class="gp-type-name" style="font-family:var(--font-mono);font-size:12px">within ${k}</div><div style="flex:1;margin:0 8px"><div class="rank-bar-track"><div class="rank-bar-fill ${cls}" style="width:${v}%"></div></div></div><div class="gp-type-count">${v}%</div></div>`
  ).join('');
}

  // Game Pigeon section

    const typeRows = p.gamePigeonTypes.length
      ? p.gamePigeonTypes.map(([game,cnt])=>`<div class="gp-type-row"><div class="gp-type-name">${esc(game)}</div><div class="gp-type-count">${fmt(cnt)}</div></div>`).join('')
      : '';
    gpInner = `<div class="gp-stat"><span class="gp-num">${fmt(p.gamePigeon)}</span> Game Pigeon messages in this 1:1</div>
      ${typeRows ? `<div class="gp-type-list">${typeRows}</div>` : ''}`;
  } else {
    gpInner = '<div class="empty">Not much Game Pigeon activity together.</div>';
  }

  // Word cloud

    ? `<div class="word-cloud">`+p.topWords.slice(0,20).map(([w,c])=>`<div class="word-chip"><b>${esc(w)}</b><span class="n">${fmt(c)}</span></div>`).join('')+`</div>`

    <div class="lookup-profile">
      <div class="lookup-profile-head">
        <div class="lookup-profile-name">${esc(p.name)}</div>
        ${addrLine ? `<div class="lookup-profile-sub">${addrLine}</div>` : ''}
      </div>

      <div class="hero-row">
        <div class="hero-stat"><div class="num teal">${fmt(p.sent+p.received)}</div><div class="label">1:1 messages</div></div>
        <div class="hero-stat"><div class="num">${fmt(p.sent)}</div><div class="label">You sent</div></div>
        <div class="hero-stat"><div class="num amber">${fmt(p.received)}</div><div class="label">They sent</div></div>
        <div class="hero-stat"><div class="num">${p.hasOneOnOne && p.hourCounts ? formatHourLabel(p.peakHour) : '—'}</div><div class="label">They usually text</div></div>
      </div>

      ${sectionHtml('lookup-reply', 'Reply Times', 'burst-based · 1:1 only · gaps under 48h', `
        <div class="reply-grid">
          <div class="reply-card">
            <div class="reply-label">Your median reply</div>
            <div class="reply-value teal">${formatDuration(p.yourResponseMs)}</div>
            <div style="margin-top:12px;">${responsePctsHtml(p.yourResponsePcts,'sent')}</div>
          </div>
          <div class="reply-card">
            <div class="reply-label">Their median reply</div>
            <div class="reply-value amber">${formatDuration(p.theirResponseMs)}</div>
            <div style="margin-top:12px;">${responsePctsHtml(p.theirResponsePcts,'received')}</div>
          </div>
        </div>
      `)}

      ${sectionHtml('lookup-hours', 'When They Text', 'across all shared chats, all-time', `<div class="panel">${hourlyStripHtml(p.hourCounts)}</div>`)}

      ${sectionHtml('lookup-groups', 'Shared Group Chats', 'group chats you have together', `<div class="panel">${groupChatsHtml}</div>`)}

      ${sectionHtml('lookup-words', 'Top Words (1:1)', 'combined words from your 1:1 conversation', `<div class="panel">${wordCloud}</div>`)}

      ${sectionHtml('lookup-emoji', 'Emoji (1:1)', 'all-time', `<div class="panel"><div style="padding:4px 0 0 8px;font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:-4px">YOU SENT</div>${emojiRow(p.emojis_sent)}<div style="padding:4px 0 0 8px;font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:-4px">THEY SENT</div>${emojiRow(p.emojis_received)}</div>`)}

      ${p.avgCharsSent ? sectionHtml('lookup-len', 'Message Length (1:1)', 'average characters per message', `
        <div class="reply-grid">
          <div class="reply-card"><div class="reply-label">Your avg length</div><div class="reply-value teal">${p.avgCharsSent} chars</div></div>
          <div class="reply-card"><div class="reply-label">Their avg length</div><div class="reply-value amber">${p.avgCharsReceived||'—'} chars</div></div>
        </div>

function lookupHtml(){
  const q = (state.lookupQuery||'').trim().toLowerCase();
  let results = [];
  if(!state.lookupPersonId && q){
    results = Object.entries(DATA.handles)
      .filter(([id,name])=>{
        if(name.toLowerCase().includes(q)) return true;
        const addrs = DATA.handle_contacts && DATA.handle_contacts[id];
        return addrs && addrs.some(a=>a.toLowerCase().includes(q));
      })
      .slice(0,8);
  }

  const searchBox = `
    <div class="lookup-search-wrap">
      <input id="lookup-search" type="text" placeholder="Search a name, number, or email…"
        value="${esc(state.lookupQuery||'')}" oninput="setLookupQuery(this)" />
      ${state.lookupPersonId ? `<button class="lookup-clear" onclick="clearLookupPerson()">Clear</button>` : ''}
    </div>
  `;

  const resultsHtml = results.length ? `
    <div class="lookup-results">
      ${results.map(([id,name])=>`
        <div class="lookup-result-row" onclick="selectLookupPerson('${id}')">
          <div class="lookup-result-name">${esc(name)}</div>
          <div class="lookup-result-sub">${esc((DATA.handle_contacts[id]||[]).join(', '))}</div>
        </div>
      `).join('')}
    </div>
  ` : (q ? `<div class="empty">No matches.</div>` : '');

  const profileHtml = state.lookupPersonId ? renderPersonProfile(getPersonProfile(state.lookupPersonId)) : '';

  return `
    <div class="section">
      <div class="section-head-static"><div class="section-title">Look Up a Person</div><div class="section-note">search by name, number, or email</div></div>
      <div class="panel lookup-panel">
        ${searchBox}
        ${resultsHtml}
      </div>
    </div>
    ${profileHtml}
  `;
}

function contactTip(id){
  if(id === 'me') return 'You';
  const name = (DATA.handles && DATA.handles[id]) || id;
  const addrs = DATA.handle_contacts && DATA.handle_contacts[id];
  if(!addrs || addrs.length===0) return name;
  if(addrs.length===1 && addrs[0]===name) return name;
  return name + ' — ' + addrs.join(', ');
}

function rankRowHtml(idx, name, count, max, tag, clickable, extraClass, tipOverride){
  const pct = max>0 ? Math.max(4,(count/max)*100) : 0;
  const tagHtml = tag ? `<span class="tag">${esc(tag)}</span>` : '';
  const cls = 'rank-row' + (clickable ? ' clickable' : '') + (extraClass ? ' '+extraClass : '');
  const clickAttr = clickable ? `onclick="${clickable}"` : '';
  const tip = tipOverride || name;
  return `<div class="${cls}" ${clickAttr}>
    <div class="rank-idx">${String(idx).padStart(2,'0')}</div>
    <div class="rank-name" data-tip="${esc(tip)}" onmouseenter="showTip(event,this.dataset.tip)" onmousemove="moveTip(event)" onmouseleave="hideTip()" aria-label="${esc(tip)}">${esc(name)}${tagHtml}</div>
    <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
    <div class="rank-count">${fmt(count)}</div>
  </div>`;
}

function splitRankRowHtml(idx, name, sent, received, max, contactInfoTip){
  const total = sent + received;
  const totalPct = max>0 ? Math.max(4,(total/max)*100) : 0;
  const sentShare = total ? (sent/total*100) : 50;
  const recvShare = 100 - sentShare;
  // The whole row shows combined stats; name overrides with contact info on hover
  const rowTip = `${name} — Sent ${fmt(sent)} · Received ${fmt(received)}`;
  const nameTip = contactInfoTip && contactInfoTip !== name ? contactInfoTip : rowTip;
  return `<div class="rank-row" data-tip="${esc(rowTip)}" onmouseenter="showTip(event,this.dataset.tip)" onmousemove="moveTip(event)" onmouseleave="hideTip()">
    <div class="rank-idx">${String(idx).padStart(2,'0')}</div>
    <div class="rank-name" data-tip="${esc(nameTip)}" onmouseenter="showTip(event,this.dataset.tip);event.stopPropagation()" onmousemove="moveTip(event)" onmouseleave="hideTip()" aria-label="${esc(nameTip)}">${esc(name)}</div>
    <div class="rank-bar-track">
      <div class="rank-bar-fill-wrap" style="width:${totalPct}%">
        <div class="rank-bar-fill sent" style="width:${sentShare}%"></div>
        <div class="rank-bar-fill received" style="width:${recvShare}%"></div>
      </div>
    </div>
    <div class="rank-count">${fmt(total)}</div>
  </div>`;
}

function groupChatRowHtml(idx, item, max){
  const isOpen = state.openChat === item.id;
  const tag = (item.chat.participants.length+1) + ' on line';
  let html = rankRowHtml(idx, item.chat.name, item.count, max, tag, `toggleChat('${item.id}')`);
  if(isOpen){
    const parts = Object.entries(item.participants)
      .map(([who,count])=>({who, name: who==='me' ? 'You' : (DATA.handles[who]||who), count}))
      .sort((a,b)=>b.count-a.count);
    const pmax = parts.length ? parts[0].count : 1;
    html += `<div class="subpanel">` + parts.map((p,i)=>rankRowHtml(i+1, p.name, p.count, pmax, null, null, null, contactTip(p.who))).join('') + `</div>`;
  }
  return html;
}

function heatGridHtml(heat){
  const max = Math.max(...heat.flat(),1);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cells = `<div></div>`;
  for(let h=0;h<24;h++){ cells += `<div class="heat-hour-label">${h%2===0?h:''}</div>`; }
  days.forEach((d,di)=>{
    cells += `<div class="heat-label">${d}</div>`;
    heat[di].forEach((v,hi)=>{
      const alpha = v/max;
      const hourLabel = String(hi).padStart(2,'0')+':00';
      const tip = `${d} ${hourLabel} — ${fmt(v)} message${v===1?'':'s'}`;
      cells += `<div class="heat-cell" style="background:rgba(94,234,212,${(0.06+alpha*0.85).toFixed(3)})"
        data-tip="${esc(tip)}"
        onmouseenter="showTip(event,this.dataset.tip)"
        onmousemove="moveTip(event)"
        onmouseleave="hideTip()"
        aria-label="${esc(tip)}"></div>`;
    });
  });
  return `<div class="heat-wrap"><div class="heat-grid">${cells}</div></div>`;
}

function showTip(e, text){
  const tip = document.getElementById('app-tooltip');
  if(!tip) return;
  tip.textContent = text;
  tip.style.left = (e.clientX+14)+'px';
  tip.style.top = (e.clientY+14)+'px';
  tip.style.display = 'block';
}

function moveTip(e){
  const tip = document.getElementById('app-tooltip');
  if(!tip || tip.style.display!=='block') return;
  tip.style.left = (e.clientX+14)+'px';
  tip.style.top = (e.clientY+14)+'px';
}

function hideTip(){
  const tip = document.getElementById('app-tooltip');
  if(tip) tip.style.display = 'none';
}

function emojiStatsHtml(){
  const years = Object.keys(DATA.emoji_freq.by_year_sent||{}).sort();
  const allYears = [...new Set([...years, ...Object.keys(DATA.emoji_freq.by_year_received||{})])].sort();
  const [emojiYear, setEmojiYear] = [state.emojiYear||'all', (y)=>{ state.emojiYear=y; render(); }];

  const audTab = (key,label) => `<button class="tab-btn${state.emojiAud===key?' active':''}" onclick="state.emojiAud='${key}';render()">${label}</button>`;

  let items;
  if(emojiYear==='all'){
    const src = state.emojiAud==='sent' ? DATA.emoji_freq.sent : state.emojiAud==='received' ? DATA.emoji_freq.received : DATA.emoji_freq.overall;
    items = src||[];
  } else {
    const sentY = (DATA.emoji_freq.by_year_sent||{})[emojiYear]||[];
    const recvY = (DATA.emoji_freq.by_year_received||{})[emojiYear]||[];
    if(state.emojiAud==='sent') items=sentY;
    else if(state.emojiAud==='received') items=recvY;
    else {
      const m = {};
      for(const [e,c] of sentY) m[e]=(m[e]||0)+c;
      for(const [e,c] of recvY) m[e]=(m[e]||0)+c;
      items=Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,30);
    }
  }

  const pills = [`<button class="year-pill${emojiYear==='all'?' active':''}" onclick="state.emojiYear='all';render()">All time</button>`,
    ...allYears.map(y=>`<button class="year-pill${emojiYear===y?' active':''}" onclick="state.emojiYear='${y}';render()">${y}</button>`)
  ].join('');

  const chips = items.length
    ? items.slice(0,40).map(([e,c])=>`<div class="emoji-chip">${esc(e)}<span class="en">${fmt(c)}</span></div>`).join('')
    : `<div class="empty">No emoji found.</div>`;

  return sectionHtml('emoji', 'Emoji', 'frequency of emojis used', `
    <div class="panel" style="padding:12px;">
      <div class="tabs" style="margin-bottom:8px;">${audTab('overall','Overall')}${audTab('sent','You')}${audTab('received','Everyone else')}</div>
      <div class="year-pills">${pills}</div>
      <div class="emoji-cloud">${chips}</div>
    </div>
  `);
}

function longestMsgsHtml(){
  const side = state.longestSide||'sent';
  const msgs = (DATA.longest_messages[side]||[]);
  const [expandedIdx, setExpanded] = [state.longestExpanded||{}, null];

  const rows = msgs.map((m,i)=>{

      : `<div class="long-msg-preview">${esc(m.preview)}</div>${m.chars > 120 ? `<button class="long-msg-expand" onclick="state.longestExpanded=state.longestExpanded||{};state.longestExpanded['${side}_${i}']=true;render()">↓ Show full (${fmt(m.chars)} chars)</button>` : ''}`;

function vocabularyHtml(){
  const items = (DATA.word_freq[state.vocabGram] && DATA.word_freq[state.vocabGram][state.vocabAudience]) || [];
  const isMessages = state.vocabGram === 'messages';

  let body;
  if(items.length === 0){
    body = '<div class="empty">No repeated text found for this filter.</div>';
  } else if(isMessages){
    const max = items[0][1];
    body = items.slice(0,25).map((pair,i)=>rankRowHtml(i+1, pair[0], pair[1], max)).join('');
  } else {
    body = items.slice(0,60).map(([w,c])=>
      `<div class="word-chip"><b>${esc(w)}</b><span class="n">${fmt(c)}</span></div>`
    ).join('');
    body = `<div class="word-cloud">${body}</div>`;
  }

  const audTab = (key,label) => `<button class="tab-btn${state.vocabAudience===key?' active':''}" onclick="setVocabAudience('${key}')">${label}</button>`;
  const gramTab = (key,label) => `<button class="tab-btn${state.vocabGram===key?' active':''}" onclick="setVocabGram('${key}')">${label}</button>`;
  const note = isMessages
    ? 'exact texts sent more than once &middot; all-time'
    : 'all-time, not affected by date range';
  return sectionHtml('vocabulary', 'Vocabulary', note, `
    <div class="tab-row" style="margin-top:-4px;">
      <div class="tabs">${audTab('overall','Overall')}${audTab('sent','You')}${audTab('received','Everyone else')}</div>
      <div class="tabs">${gramTab('unigrams','Words')}${gramTab('bigrams','Phrases')}${gramTab('messages','Full messages')}</div>
    </div>
    <div class="panel">${body}</div>
  `);
}

function computeYearlyStats(){
  const byYear = {};
  for(const m of DATA.messages){
    const [ts,,,isFromMe] = m;
    const y = new Date(ts).getFullYear();
    if(!byYear[y]) byYear[y] = {sent:0, received:0};
    if(isFromMe) byYear[y].sent++; else byYear[y].received++;
  }
  return Object.keys(byYear).sort((a,b)=>a-b).map(y=>({
    year: y, sent: byYear[y].sent, received: byYear[y].received,
    total: byYear[y].sent + byYear[y].received,
  }));
}

function yearlyComparisonHtml(){
  const stats = computeYearlyStats();
  if(stats.length < 2) return '';
  return sectionHtml('yearly', 'Year over Year', 'sent vs received, all-time', `
    <div class="panel">
      <div class="legend-row">
        <span class="legend-item"><span class="dot dot-you"></span>Sent</span>
        <span class="legend-item"><span class="dot dot-them"></span>Received</span>
      </div>
      <div class="chart-wrap"><canvas id="yearly-canvas" style="width:100%;height:220px;"></canvas></div>
    </div>
  `);
}

function drawYearlyChart(stats){
  const canvas = document.getElementById('yearly-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  if(stats.length===0) return;

  const maxV = Math.max(...stats.map(s=>Math.max(s.sent,s.received)),1);
  const padSide=10, padTop=10, padBottom=24;
  const plotW = w-padSide*2, plotH = h-padTop-padBottom;

  ctx.strokeStyle = '#26313C';
  ctx.lineWidth = 1;
  for(let i=0;i<=3;i++){
    const y = padTop + plotH*i/3;
    ctx.beginPath(); ctx.moveTo(padSide,y); ctx.lineTo(w-padSide,y); ctx.stroke();
  }

  const n = stats.length;
  const groupW = plotW/n;
  const barW = Math.min(28, groupW*0.32);
  const gap = 4;
  const bars = [];

  ctx.font = '10px IBM Plex Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  stats.forEach((s,i)=>{
    const groupCenter = padSide + groupW*i + groupW/2;
    const sentH = (s.sent/maxV)*plotH;
    const recvH = (s.received/maxV)*plotH;
    const sentX = groupCenter - barW - gap/2;
    const recvX = groupCenter + gap/2;

    ctx.fillStyle = '#5EEAD4';
    ctx.fillRect(sentX, padTop+plotH-sentH, barW, sentH);
    ctx.fillStyle = '#F2A65A';
    ctx.fillRect(recvX, padTop+plotH-recvH, barW, recvH);

    ctx.fillStyle = '#8492A0';
    ctx.fillText(s.year, groupCenter, padTop+plotH+7);

    bars.push({x0: sentX, x1: recvX+barW, year: s.year, sent: s.sent, received: s.received});
  });

  canvas.onmousemove = function(e){
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const hit = bars.find(b=>x>=b.x0 && x<=b.x1);
    if(hit){
      showTip(e, `${hit.year} — Sent ${fmt(hit.sent)} · Received ${fmt(hit.received)}`);
    } else {
      hideTip();
    }
  };
  canvas.onmouseleave = function(){ hideTip(); };
}

function disparitiesHtml(items){
  if(!items.length){
    return sectionHtml('balance', 'Balance', '1:1 conversations only',
      `<div class="panel"><div class="empty">Not enough 1:1 conversation history in this range.</div></div>`);
  }
  const rows = items.map(d=>{
    const youPct = d.total ? (d.you/d.total*100) : 50;
    const lean = d.you===d.them ? 'Even' : (d.you>d.them ? `You lead ${(d.you/(d.them||1)).toFixed(1)}x` : `They lead ${(d.them/(d.you||1)).toFixed(1)}x`);
    return `<div class="disparity-row">
      <div class="disparity-top"><div class="disparity-name" data-tip="${esc(contactTip(d.id))}" onmouseenter="showTip(event,this.dataset.tip)" onmousemove="moveTip(event)" onmouseleave="hideTip()" aria-label="${esc(contactTip(d.id))}">${esc(d.name)}</div><div class="disparity-note">${lean}</div></div>
      <div class="disparity-bars">
        <div class="seg-you" style="width:${youPct}%" title="You: ${d.you}"></div>
        <div class="seg-them" style="width:${100-youPct}%" title="Them: ${d.them}"></div>
      </div>
      <div class="disparity-counts">
        <span class="you">You sent ${fmt(d.you)}</span>
        <span class="them">They sent ${fmt(d.them)}</span>
        <span class="total">${fmt(d.total)} total</span>
      </div>
    </div>`;
  }).join('');
  return sectionHtml('balance', 'Balance', '1:1 conversations only', `<div class="panel">${rows}</div>`);
}

function spotlightHtml(topChats){
  const top3 = topChats.slice(0,3);
  if(!top3.length) return '';
  const cards = top3.map(c=>{
    const parts = Object.entries(c.participants)
      .map(([who,count])=>({who, name: who==='me'?'You':(DATA.handles[who]||who), count}))
      .sort((a,b)=>b.count-a.count).slice(0,5);
    const pmax = parts.length ? parts[0].count : 1;
    const senders = parts.map(p=>`<div class="spotlight-sender">
      <div class="n" data-tip="${esc(contactTip(p.who))}" onmouseenter="showTip(event,this.dataset.tip)" onmousemove="moveTip(event)" onmouseleave="hideTip()" aria-label="${esc(contactTip(p.who))}">${esc(p.name)}</div>
      <div class="track"><div class="fill" style="width:${(p.count/pmax*100)}%"></div></div>
      <div class="c">${fmt(p.count)}</div>
    </div>`).join('');
    const words = DATA.chat_word_freq[c.id];
    const wordChips = (words && words.unigrams && words.unigrams.length)
      ? `<div class="spotlight-words">` + words.unigrams.slice(0,6).map(([w])=>`<span class="spotlight-chip">${esc(w)}</span>`).join('') + `</div>`
      : '';
    return `<div class="spotlight-card">
      <div class="spotlight-title" data-tip="${esc(c.chat.name)}" onmouseenter="showTip(event,this.dataset.tip)" onmousemove="moveTip(event)" onmouseleave="hideTip()" aria-label="${esc(c.chat.name)}">${esc(c.chat.name)}</div>
      <div class="spotlight-sub">${fmt(c.count)} messages in range</div>
      ${senders}${wordChips}
    </div>`;
  }).join('');
  return sectionHtml('spotlight', 'Group Chat Spotlight', 'senders in range &middot; words are all-time',
    `<div class="spotlight-grid">${cards}</div>`);
}

function weekStartKey(dk){
  const [y,m,d] = dk.split('-').map(Number);
  const date = new Date(y, m-1, d);
  date.setDate(date.getDate() - date.getDay());
  return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
}

function tsToDateKey(ts){
  const d = new Date(ts);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function toWeeklyAverage(dayEntries, rangeStart, rangeEnd){
  if(!dayEntries.length) return [];
  const rangeStartDk = tsToDateKey(rangeStart);
  const rangeEndDk = tsToDateKey(rangeEnd);
  const buckets = {};  // wk -> {sum, days}
  for(const [dk, count] of dayEntries){
    if(dk < rangeStartDk || dk > rangeEndDk) continue;
    let wk = weekStartKey(dk);
    // Snap partial first week so Jan 1 doesn't show as Dec 31 of prior year
    if(wk < rangeStartDk) wk = rangeStartDk;
    if(!buckets[wk]) buckets[wk] = {sum:0, days:0};
    buckets[wk].sum += count;
    buckets[wk].days++;
  }
  return Object.entries(buckets)
    .sort((a,b)=>a[0]<b[0]?-1:1)
    .map(([wk,{sum,days}])=>[wk, sum/Math.max(1,days)]);
}

function formatAxisDate(key, multiYear){
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  if(multiYear){
    return dt.toLocaleDateString('en-US',{month:'short'}) + " '" + String(y).slice(2);
  }
  return dt.toLocaleDateString('en-US',{month:'short', day:'numeric'});
}

function pickTickIndices(n, maxTicks){
  if(n<=1) return [0];
  const count = Math.min(maxTicks, n);
  const ticks = [];
  for(let i=0;i<count;i++){
    ticks.push(Math.round(i*(n-1)/(count-1)));
  }
  return Array.from(new Set(ticks));
}

function drawActivityChart(dayEntries){
  const canvas = document.getElementById('activity-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  if(dayEntries.length===0) return;

  const vals = dayEntries.map(e=>e[1]);
  const maxV = Math.max(...vals,1);
  const padSide = 10, padTop = 10, padBottom = 24;
  const plotW = w - padSide*2, plotH = h - padTop - padBottom;
  const years = new Set(dayEntries.map(e=>e[0].slice(0,4)));
  const multiYear = years.size > 1;
  const n = dayEntries.length;
  const stepX = n>1 ? plotW/(n-1) : 0;

  function ptX(i){ return padSide + i*stepX; }
  function ptY(v){ return padTop + plotH - (v/maxV)*plotH; }

  // Grid lines
  ctx.strokeStyle = '#26313C'; ctx.lineWidth = 1;
  for(let i=0;i<=3;i++){
    const y = padTop + plotH*i/3;
    ctx.beginPath(); ctx.moveTo(padSide,y); ctx.lineTo(w-padSide,y); ctx.stroke();
  }

  // Area fill
  ctx.beginPath();
  dayEntries.forEach((e,i)=>{ const x=ptX(i),y=ptY(e[1]); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
  const grad = ctx.createLinearGradient(0,padTop,0,padTop+plotH);
  grad.addColorStop(0,'rgba(94,234,212,0.35)'); grad.addColorStop(1,'rgba(94,234,212,0.02)');
  ctx.lineTo(ptX(n-1),padTop+plotH); ctx.lineTo(padSide,padTop+plotH);
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath();
  dayEntries.forEach((e,i)=>{ const x=ptX(i),y=ptY(e[1]); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
  ctx.strokeStyle = '#5EEAD4'; ctx.lineWidth = 1.6;
  ctx.shadowColor = 'rgba(94,234,212,0.6)'; ctx.shadowBlur = 4; ctx.stroke(); ctx.shadowBlur = 0;

  // Axis labels
  const maxTicks = w < 500 ? 4 : 6;
  const tickIdx = pickTickIndices(n, maxTicks);
  ctx.strokeStyle = '#26313C'; ctx.fillStyle = '#8492A0';
  ctx.font = '10px IBM Plex Mono, monospace'; ctx.textBaseline = 'top';
  tickIdx.forEach(i=>{
    const x = ptX(i);
    ctx.beginPath(); ctx.moveTo(x,padTop+plotH); ctx.lineTo(x,padTop+plotH+4); ctx.stroke();
    const label = formatAxisDate(dayEntries[i][0], multiYear);
    ctx.textAlign = i===0 ? 'left' : i===n-1 ? 'right' : 'center';
    ctx.fillText(label, x, padTop+plotH+7);
  });

  // Helper: draw dot at index i on top of everything
  function drawDot(i){
    const x=ptX(i), y=ptY(dayEntries[i][1]);
    ctx.beginPath(); ctx.arc(x,y,4.5,0,Math.PI*2);
    ctx.fillStyle='#5EEAD4'; ctx.shadowColor='rgba(94,234,212,0.7)'; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2);
    ctx.fillStyle='#0D1117'; ctx.fill();
  }

  let lastDotIdx = -1;
  canvas.onmousemove = function(e){
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    let idx = stepX>0 ? Math.round((x-padSide)/stepX) : 0;
    idx = Math.max(0, Math.min(n-1, idx));
    const [key, count] = dayEntries[idx];
    showTip(e, `Week of ${formatAxisDate(key, multiYear)} — avg ${fmt(count)}/day`);
    if(idx !== lastDotIdx){
      lastDotIdx = idx;
      // Quick redraw only the dot area — clear row then redraw dot
      ctx.clearRect(padSide, padTop, plotW+10, plotH+10);
      // Re-draw area fill
      ctx.beginPath();
      dayEntries.forEach((en,i)=>{ const cx=ptX(i),cy=ptY(en[1]); if(i===0) ctx.moveTo(cx,cy); else ctx.lineTo(cx,cy); });
      ctx.lineTo(ptX(n-1),padTop+plotH); ctx.lineTo(padSide,padTop+plotH);
      ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
      // Re-draw line
      ctx.beginPath();
      dayEntries.forEach((en,i)=>{ const cx=ptX(i),cy=ptY(en[1]); if(i===0) ctx.moveTo(cx,cy); else ctx.lineTo(cx,cy); });
      ctx.strokeStyle='#5EEAD4'; ctx.lineWidth=1.6;
      ctx.shadowColor='rgba(94,234,212,0.6)'; ctx.shadowBlur=4; ctx.stroke(); ctx.shadowBlur=0;
      drawDot(idx);
    }
  };
  canvas.onmouseleave = function(){ lastDotIdx=-1; hideTip(); };
}

function render(){
  const minTs = DATA.meta.date_min, maxTs = DATA.meta.date_max;
  const range = computeRangeBounds(state.rangeKey, minTs, maxTs);
  const agg = computeAggregates(range);
  const contactMax = agg.topContacts.length ? agg.topContacts[0].count : 0;
  const chatMax = agg.topChats.length ? agg.topChats[0].count : 0;
  const days = Math.max(1, Math.round((range.end-range.start)/(24*3600*1000)));

  const rangeButtons = RANGES.map(r=>
    `<button class="${state.rangeKey===r.key?'active':''}" onclick="setRange('${r.key}')">${r.label}</button>`
  ).join('');

  const contactsHtml = agg.topContacts.length
    ? `<div class="legend-row" style="padding-top:0;margin-bottom:4px;">
         <span class="legend-item"><span class="dot dot-you"></span>Sent</span>
         <span class="legend-item"><span class="dot dot-them"></span>Received</span>
       </div>` +
      agg.topContacts.map((c,i)=>splitRankRowHtml(i+1, c.name, c.sent, c.received, contactMax, contactTip(c.id))).join('')
    : '<div class="empty">No messages in this range.</div>';

  const chatsHtml = agg.topChats.length
    ? agg.topChats.map((c,i)=>groupChatRowHtml(i+1, c, chatMax)).join('')
    : '<div class="empty">No group chat activity in this range.</div>';

  const peopleGroupsHtml = `
    <div class="grid-2">
      ${sectionHtml('people', 'Top 10 People', '1:1 conversations only', `<div class="panel">${contactsHtml}</div>`)}
      ${sectionHtml('groupchats', 'Top 10 Group Chats', 'tap to see who talks most', `<div class="panel">${chatsHtml}</div>`)}
    </div>
    ${spotlightHtml(agg.topChats)}
    ${disparitiesHtml(agg.disparities)}
  `;

  const patternsHtml = `
    ${sectionHtml('activity', 'Message Trend', 'weekly average, messages per day',
      `<div class="panel"><div class="chart-wrap"><canvas id="activity-canvas" style="width:100%;height:200px;"></canvas></div></div>`)}
    ${sectionHtml('signal', 'Signal Pattern', 'messages by hour &amp; weekday, in range',
      `<div class="panel">${heatGridHtml(agg.heat)}</div>`)}
  `;

  const allTimeHtml = `
    ${yearlyComparisonHtml()}
    ${emojiStatsHtml()}
    ${msgLengthHtml()}
    ${longestMsgsHtml()}
    ${vocabularyHtml()}
  `;

  const tabBar = `<div class="main-tabs">
    <button class="main-tab${state.mainTab==='people-groups'?' active':''}" onclick="setMainTab('people-groups')">People &amp; Groups</button>
    <button class="main-tab${state.mainTab==='patterns'?' active':''}" onclick="setMainTab('patterns')">Patterns</button>
    <button class="main-tab${state.mainTab==='all-time'?' active':''}" onclick="setMainTab('all-time')">All-Time</button>
    <div class="main-tab-divider"></div>
    <a class="main-tab-link" href="iMessage_Dashboard_Lookup.html">Lookup ↗</a>
  </div>`;

  const tabContent = state.mainTab === 'people-groups' ? peopleGroupsHtml
    : state.mainTab === 'patterns' ? patternsHtml
    : allTimeHtml;

  document.getElementById('root').innerHTML = `
    <div class="wrap">
      <div class="statement-head">
        <div>
          <div class="eyebrow">Your personal report</div>
          <h1>iMessages Wrapped</h1>
          <div class="subline">${new Date(minTs).toLocaleDateString()} — ${new Date(maxTs).toLocaleDateString()} &middot; generated ${new Date(DATA.meta.generated_at).toLocaleString()}</div>
        </div>
        <div class="range-control">${rangeButtons}</div>
      </div>

      <div class="hero-row">
        <div class="hero-stat"><div class="num teal">${fmt(agg.total)}</div><div class="label">Messages in range</div></div>
        <div class="hero-stat"><div class="num">${fmt(agg.sent)}</div><div class="label">Sent by you</div></div>
        <div class="hero-stat"><div class="num amber">${fmt(agg.received)}</div><div class="label">Received</div></div>
        <div class="hero-stat"><div class="num">${fmt(agg.total/days)}</div><div class="label">Avg / day</div></div>
      </div>

      ${tabBar}

      ${tabContent}

      <footer>This file runs entirely in your browser. Your message data was embedded locally by build_dashboard.py and never left your machine.</footer>
    </div>
  `;

  if(state.mainTab === 'patterns'){
    drawActivityChart(toWeeklyAverage(agg.dayEntries, range.start, range.end));
  }
  if(state.mainTab === 'all-time'){
    drawYearlyChart(computeYearlyStats());
  }
}

function setRange(key){ state.rangeKey = key; render(); }
function toggleChat(id){ state.openChat = state.openChat === id ? null : id; render(); }
function setVocabAudience(a){ state.vocabAudience = a; render(); }
function setVocabGram(g){
  state.vocabGram = g;
  if(g === 'messages' && state.vocabAudience === 'overall') state.vocabAudience = 'sent';
  render();
}

render();
</script>
